}
// クラスチェンジ発動の光る演出(押下位置に金色のバースト)
function classChangeGlow(x,y){
  if(!state.settings.motion) return;
  const el=document.createElement("div"); el.className="ccGlow"; el.style.left=x+"px"; el.style.top=y+"px";
  el.innerHTML='<span class="ccStar">⭐</span>';
  document.body.appendChild(el);
  setTimeout(()=>{ if(el.parentNode) el.parentNode.removeChild(el); },680);
}
function holdStop(){
  if(_holdInitTimer){ clearTimeout(_holdInitTimer); _holdInitTimer=null; }
  if(_holdRepeatTimer){ clearInterval(_holdRepeatTimer); _holdRepeatTimer=null; }
  _rapidHold=false; _holdStarved=false; _ccHoldAt=0;
  if(_holdRingEl){ const r=_holdRingEl; _holdRingEl=null; if(r.parentNode) r.parentNode.removeChild(r); }
  if(_holdFxEl){ const f=_holdFxEl; _holdFxEl=null; f.classList.remove("show"); setTimeout(()=>{ if(f.parentNode) f.parentNode.removeChild(f); },350); }
}
function holdStart(ev){
  let el=ev.target;
  while(el&&el!==dom.panel&&!el.dataset.action) el=el.parentElement;
  if(!el||!el.dataset.action) return;
  const a=el.dataset.action; if(a!=="buyupg"&&a!=="levelup") return;
  const id=el.dataset.id;
  holdStop(); _holdCombo=0; unlockAudio();
  const px=(ev.clientX!=null?ev.clientX:window.innerWidth/2), py=(ev.clientY!=null?ev.clientY:window.innerHeight/2);
  const buy=()=> (a==="buyupg") ? buyUpgrade(id) : levelUpGirl(id,1);
  if(buy()===false) return;                  // 1回目から買えない(資金/最大)なら長押し開始しない
  holdRingShow(px,py);                        // 発動ディレイのサークルタイマー(1秒)
  _holdInitTimer=setTimeout(()=>{
    _holdInitTimer=null;
    if(_holdRingEl){ const r=_holdRingEl; _holdRingEl=null; r.classList.add("burst"); setTimeout(()=>{ if(r.parentNode) r.parentNode.removeChild(r); },220); }
    _rapidHold=true;
    blip(900,0.08);                           // 発動音
    if(state.settings.haptics && navigator.vibrate){ try{navigator.vibrate(24);}catch(e){} }
    const tick=()=>{
      // 強化の最大レベルは本当に停止(資金待ちと違い回復しない)
      if(a==="buyupg"){ const u=UPG_BY_ID[id]; if(u&&u.max!=null&&(state.upgrades[id]||0)>=u.max){ holdStop(); return; } }
      // 仲間がレベル上限: クラスチェンジを即時実行(レベルアップと同じ連打感)。発動で光る演出
      if(a==="levelup"){
        const st=state.girls[id];
        if(st && (st.level||0)>=LCAP){
          if(canClassChange(id) && Bg(state.hihiirokane).gte(classChangeCost(id))){
            if(doClassChange(id)){ _holdCombo=0; classChangeGlow(px,py); }
            _holdStarved=false;
          } else {
            if(!_holdStarved){ _holdStarved=true; holdFx(px,py, canClassChange(id)?"⭐ クラスチェンジ資金待ち…":"Lv.MAX(覚醒ステージ未到達)"); }
          }
          return;
        }
      }
      if(buy()===false){                            // 資金不足: 連打状態は維持(資金が戻れば自動再開)
        if(!_holdStarved){ _holdStarved=true; holdFx(px,py,(_holdCombo>0?"×"+_holdCombo+" ":"")+"資金待ち…"); }
        return;
      }
      _holdStarved=false;
      _holdCombo++;
      holdFx(px,py,"×"+_holdCombo+" 連打中！");
      if(_holdCombo%5===0) blip(720,0.04);          // 連打音は間引き(耳ざわり防止)
      if(state.settings.haptics && navigator.vibrate){ try{navigator.vibrate(5);}catch(e){} }
    };
    tick();
    _holdRepeatTimer=setInterval(tick,HOLD_INTERVAL);
  },HOLD_DELAY);
}
function onPanelClick(ev){
  let el=ev.target;
  while(el&&el!==dom.panel&&!el.dataset.action) el=el.parentElement;
  if(!el||!el.dataset.action) return;
  const a=el.dataset.action, id=el.dataset.id, key=el.dataset.key;
  unlockAudio();
  // 強化/レベルアップのポインタ由来clickはpointerdownの長押し系(holdStart)で処理済み → 二重防止。
  // キーボード操作(ev.detail===0)はここで1回実行してa11yを担保。
  if((a==="buyupg"||a==="levelup") && ev.detail>0) return;
  if(a==="buyupg"){ buyUpgrade(id); }
  else if(a==="recruit"){ recruitGirl(id); renderParty(); }
  else if(a==="levelup"){ levelUpGirl(id,1); }
  else if(a==="classchange"){ doClassChange(id); renderParty(); }
  else if(a==="prestige"){ confirmPrestige(); }
  else if(a==="buyall"){ if(buyAllCheapest()>0){ renderParty(); D.dirtyPanel=true; renderPanel(true); } }
  else if(a==="toggle"){ toggleSetting(key); }
  else if(a==="hardreset"){ confirmHardReset(); }
}
function toggleSetting(key){
  state.settings[key]=!state.settings[key];
  if(key==="motion"){
    state.settings.motionUserSet=true; // ユーザーが明示変更 → 以後OS設定で上書きしない
    document.getElementById("app").classList.toggle("no-motion",!state.settings.motion);
    if(state.settings.motion){ renderBahamutSvg(); }
  }
  if(key==="bgm"){ if(state.settings.bgm) startBGM(); else stopBGM(); }
  if(key==="sound"||key==="bgm") updateSoundBtn();
  D.saveDirty=true; D.dirtyPanel=true;
  renderPanel(true);
  renderParty();
}
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll(".tabBtn").forEach(b=>{
    const sel=b.dataset.tab===tab;
    b.classList.toggle("active",sel);
    b.setAttribute("aria-selected",sel?"true":"false");
  });
  // tabpanel を現在タブへ関連付け
  const pnl=dom.panel||document.getElementById("panel");
  if(pnl) pnl.setAttribute("aria-labelledby","tab-"+tab);
  D.dirtyPanel=true;
  renderPanel(true);
}
function bindEvents(){
  const wrap=dom.bossWrap;
  // 敵味方表示エリア(battle)のどこをタップしてもボスへの攻撃として扱う(空白/仲間/主人公の上でもOK)
  const battle=document.getElementById("battle")||wrap;
  battle.addEventListener("pointerdown",tapAttack);
  wrap.addEventListener("keydown",(e)=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); tapAttack({preventDefault(){},clientX:null}); } });
  document.getElementById("tabs").addEventListener("click",(e)=>{
    const b=e.target.closest(".tabBtn"); if(b){ unlockAudio(); switchTab(b.dataset.tab);
      // 強化ヒントglow消す
      const g=b.querySelector(".glow"); if(g) g.remove();
    }
  });
  dom.panel.addEventListener("click",onPanelClick);
  dom.panel.addEventListener("pointerdown",holdStart);   // 強化/レベルアップの長押し連打
  window.addEventListener("pointerup",holdStop);
  window.addEventListener("pointercancel",holdStop);
  dom.panel.addEventListener("keydown",(e)=>{
    if((e.key==="Enter"||e.key===" ")&&e.target.dataset&&e.target.dataset.action==="toggle"){ e.preventDefault(); toggleSetting(e.target.dataset.key); }
  });
  document.getElementById("soundBtn").addEventListener("click",toggleMasterSound);
  document.addEventListener("visibilitychange",()=>{
    if(document.hidden){
      save("force");
      try{ if(D.audioCtx && D.audioCtx.state==="running") D.audioCtx.suspend(); }catch(e){}   // バックグラウンドでは音声(BGM/SE)を停止
    } else {
      D.lastTickAt=nowMs();
      try{ if(D.audioCtx && D.audioCtx.state==="suspended" && (state.settings.sound||state.settings.bgm)) D.audioCtx.resume(); }catch(e){}  // 復帰で再開
    }
  });
  window.addEventListener("pagehide",()=>save("force"));
  window.addEventListener("beforeunload",()=>save("force"));
  // ダブルタップズーム抑制(iOS)
  let lastTouch=0;
  document.addEventListener("touchend",(e)=>{ const t=nowMs(); if(t-lastTouch<300){ e.preventDefault(); } lastTouch=t; },{passive:false});
}

/* =====================================================================
   モーダル
   ===================================================================== */
let _modalLastFocus=null;
function _modalKeydown(e){
  const root=document.getElementById("modalRoot");
  if(!root||!root.classList.contains("show")) return;
  if(e.key==="Escape"){ e.preventDefault(); hideModal(); return; }
  if(e.key==="Tab"){
    const f=root.querySelectorAll('button, [tabindex]:not([tabindex="-1"])');
    if(f.length===0) return;
    const first=f[0], last=f[f.length-1];
    if(e.shiftKey){
      if(document.activeElement===first||!root.contains(document.activeElement)){ e.preventDefault(); last.focus(); }
    } else {
      if(document.activeElement===last||!root.contains(document.activeElement)){ e.preventDefault(); first.focus(); }
    }
  }
}
function showModal(html){
  const root=document.getElementById("modalRoot");
  _modalLastFocus=document.activeElement;
  root.innerHTML=`<div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">${html}</div>`;
  root.classList.add("show");
  // 背後のゲームUIを無効化(フォーカス到達/読み上げを遮断)
  const app=document.getElementById("app");
  if(app){ try{app.setAttribute("inert","");}catch(e){} app.setAttribute("aria-hidden","true"); }
  document.addEventListener("keydown",_modalKeydown,true);
  // 安全側のボタン(やめる=mNo)優先、無ければ最初のボタンへフォーカス
  const focusTarget=root.querySelector("#mNo")||root.querySelector("button");
  if(focusTarget) focusTarget.focus();
}
function hideModal(){
  const root=document.getElementById("modalRoot");
  root.classList.remove("show"); root.innerHTML="";
  document.removeEventListener("keydown",_modalKeydown,true);
  const app=document.getElementById("app");
  if(app){ try{app.removeAttribute("inert");}catch(e){} app.removeAttribute("aria-hidden"); }
  if(_modalLastFocus&&_modalLastFocus.focus){ try{_modalLastFocus.focus();}catch(e){} }
  _modalLastFocus=null;
}
function confirmPrestige(){
  const cores=prestigeGain();
  const nextMult=powB(PRES_FACTOR,(state.prestige.cores||0)+cores);
  showModal(`<h2 id="modalTitle">🐉 転生</h2>
    <p>到達ステージ ${state.stage.highest} を捧げ、<br><span class="big">竜核 +${cores}</span> を授かります。</p>
    <p>全ての進行はリセットされますが、<br>全ダメージ・全報酬が永久に強化されます。</p>
    <p>新ボーナス: ×${formatNumber(nextMult)}</p>
    <div class="modalBtns"><button class="mbtn-ghost" id="mNo">やめる</button><button class="mbtn-primary" id="mYes">転生する</button></div>`);
  document.getElementById("mNo").onclick=hideModal;
  document.getElementById("mYes").onclick=()=>{
    if(doPrestige()){ hideModal(); toast(`転生完了！竜核 +${cores}（計${state.prestige.cores}）✨ ×${formatNumber(prestigeMult())}`,{ms:3400}); renderParty(); renderBahamutSvg(); }
  };
}
function confirmHardReset(){
  showModal(`<h2 id="modalTitle">本当に消す？</h2>
    <p>すべての進行・仲間・強化・ヒヒイロカネが<br>完全に消去され、最初からになります。<br>この操作は取り消せません。</p>
    <div class="modalBtns"><button class="mbtn-ghost" id="mNo">やめる</button><button class="mbtn-primary" id="mYes" style="background:linear-gradient(100deg,#F25C7A,#FF8A5B)">全部消す</button></div>`);
  document.getElementById("mNo").onclick=hideModal;
  document.getElementById("mYes").onclick=()=>{
    try{localStorage.removeItem(SAVE_KEY);localStorage.removeItem(SAVE_KEY_BACKUP);}catch(e){}
    state=newState();
    setupStage(); recomputeDerived();
    renderBahamutSvg(); renderParty(); D.dirtyPanel=true; renderPanel(true);
    hideModal();
    toast("はじめからになりました。がんばろう！",{ms:2600});
  };
}
function showOfflineModal(res){
  if(Bg(res.goldGained).isZero()) return;
  const mins=Math.floor(res.elapsedMs/60000);
  const hrs=Math.floor(mins/60), rm=mins%60;
  const timeStr=hrs>0?`${hrs}時間${rm}分`:`${mins}分`;
  const stageLine=(res.stagesGained>0)?`<p>ステージも <span class="big">+${formatNumber(res.stagesGained)}</span> 進んだよ！</p>`:"";
  showModal(`<h2 id="modalTitle">おかえりなさい！</h2>
    <p>${timeStr} のあいだ、仲間たちが<br>バハムートと戦っていたよ。</p>
    <p>ヒヒイロカネ <span class="big">+${formatNumber(res.goldGained)}</span> 獲得！</p>
    ${stageLine}
    <div class="modalBtns"><button class="mbtn-primary" id="mOk">受け取る✨</button></div>`);
  document.getElementById("mOk").onclick=()=>{ hideModal(); blip(880,0.15); };
}

/* =====================================================================
   オンボーディング
   ===================================================================== */
let onboardActive=false, obTapCount=0;
function _onboardKeydown(e){
  if(!onboardActive) return;
  if(e.key==="Escape"){ e.preventDefault(); endOnboard(); }
}
function startOnboard(){
  if(state.onboard.done) return;
  onboardActive=true; obTapCount=0;
  const ob=document.getElementById("onboard");
  ob.setAttribute("role","dialog");
  ob.setAttribute("aria-modal","true");
  ob.setAttribute("aria-label","チュートリアル");
  ob.innerHTML=`<div class="obBubble" style="top:30%;left:50%;transform:translateX(-50%)">
    <div class="obFinger" aria-hidden="true">👆</div><br>バハムートをタップして攻撃しよう！<br>(3回タップしてね)
    <br><button class="obSkip" id="obSkip">スキップ</button></div>`;
  ob.classList.add("show");
  const skip=document.getElementById("obSkip");
  skip.onclick=endOnboard;
  // オーバーレイは pointer-events:none なので、最低限フォーカス+Escapeで脱出可能に
  if(skip) skip.focus();
  document.addEventListener("keydown",_onboardKeydown,true);
}
function endOnboard(){
  onboardActive=false;
  state.onboard.tapDone=true; state.onboard.done=true;
  const ob=document.getElementById("onboard");
  ob.classList.remove("show"); ob.innerHTML="";
  ob.removeAttribute("role"); ob.removeAttribute("aria-modal"); ob.removeAttribute("aria-label");
  document.removeEventListener("keydown",_onboardKeydown,true);
  D.saveDirty=true;
}
function checkRecruitHint(){
  if(state.onboard.recruitHinted) return;
  if(state.stage.highest>=RECRUIT_STAGE[0] && Bg(state.hihiirokane).gte(GIRLS[0].recruit)){
    state.onboard.recruitHinted=true;
    toast("仲間を呼ぼう！『仲間』タブのさくらんが自動で戦ってくれるよ🌸",{ms:3600});
    const tabBtn=document.querySelector('.tabBtn[data-tab="girls"]');
    if(tabBtn && !tabBtn.querySelector(".glow")){ const g=document.createElement("span");g.className="glow";tabBtn.appendChild(g); }
  }
}

/* =====================================================================
   B10  BOOT
   ===================================================================== */
function buildBgStars(){
  const wrap=document.getElementById("bgStars");
  let html="";
  for(let i=0;i<18;i++){
    const x=Math.random()*100, y=Math.random()*100, s=4+Math.random()*8;
    const d=(Math.random()*3).toFixed(2), dd=(Math.random()*18).toFixed(2);
    const star=Math.random()<0.6;
    html+=`<div class="bgstar" style="left:${x}%;top:${y}%;animation-delay:${d}s,${dd}s">`+
      (star?`<svg width="${s}" height="${s}" viewBox="0 0 10 10"><polygon points="5,0 6,4 10,5 6,6 5,10 4,6 0,5 4,4" fill="#FFD98A"/></svg>`
           :`<svg width="${s*0.7}" height="${s*0.7}" viewBox="0 0 10 10"><circle cx="5" cy="5" r="4" fill="#C9A7F0" opacity=".6"/></svg>`)+
      `</div>`;
  }
  wrap.innerHTML=html;
}
function init(){
  cacheDom();
  buildBgStars();
  // reduced-motion(OS設定はユーザーが明示変更していない場合のみ既定へ反映)
  let rmMql=null, rm=false;
  try{ rmMql=window.matchMedia&&window.matchMedia("(prefers-reduced-motion:reduce)"); rm=rmMql&&rmMql.matches; }catch(e){}
  state=load();
  // 大数フィールドを Big に統一(新規ゲームの newState は Number 0 のため)
  state.hihiirokane=toBig(state.hihiirokane); state.totalEarned=toBig(state.totalEarned);
  if(state.prestige) state.prestige.lifeEarned=toBig(state.prestige.lifeEarned);
  if(rm && !state.settings.motionUserSet) state.settings.motion=false;
  document.getElementById("app").classList.toggle("no-motion",!state.settings.motion);
  // OS設定のライブ変更へ追従(ユーザー明示設定済みなら追従しない)
  if(rmMql){
    const onRm=(e)=>{
      if(state.settings.motionUserSet) return;
      state.settings.motion=!e.matches;
      document.getElementById("app").classList.toggle("no-motion",!state.settings.motion);
      if(state.settings.motion) renderBahamutSvg();
      D.dirtyPanel=true; renderPanel(true); renderParty();
    };
    try{ rmMql.addEventListener("change",onRm); }catch(e){ try{ rmMql.addListener(onRm); }catch(e2){} }
  }
  // 整合性: maxHp再計算
  setupStage_keepHp();
  recomputeDerived();
  // オフライン進行
  const res=applyOfflineProgress(nowMs());
  bindEvents();
  buildSuperBar();
  renderBahamutSvg();
  renderParty();
  renderPlayer();
  D.dirtyHUD=true; D.dirtyPanel=true;
  renderHUD(); renderSuper(); renderPanel(true);
  updateSoundBtn();   // タイトルバーの音ON/OFFアイコンを現在設定に同期
  showCutin();   // リロード時も毎回、現ステージの名乗りカットインを表示(音声は解錠後のみ鳴る)
  // ループ開始
  D.lastTickAt=nowMs();
  setInterval(gameTick,TICK_MS);
  setInterval(()=>{ if(D.saveDirty) save("auto"); },AUTOSAVE_MS);
  requestAnimationFrame(renderLoop);
  // オフラインモーダル
  if(!Bg(res.goldGained).isZero()){ setTimeout(()=>showOfflineModal(res),400); }
  // オンボーディング(初回)
  if(!state.onboard.done){ setTimeout(startOnboard,500); }
  // デバッグ用
  window.__game={state,D,save,recomputeDerived,doPrestige};
}
// ロード済みstateのHPを尊重しつつmaxHpを式から再導出
function setupStage_keepHp(){
  const s=state.stage.index;
  state.bahamut.isBoss=isBossStage(s);
  const mh=bahamutHp(s);
  state.bahamut.maxHp=mh;
  state.bahamut.tier=Math.floor((s-1)/5);
  // 保存HPがmaxを超える/不正ならmaxに
  let hp=Bg(state.bahamut.hp);
  if(hp.isZero()||hp.gt(mh)) hp=mh;
  state.bahamut.hp=hp;
}

if(document.readyState==="loading"){
  document.addEventListener("DOMContentLoaded",init);
} else { init(); }
})();
</script>
