<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FCE9F1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>ヒヒイロカネ・クリッカー 〜バハムートの煌めき〜</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpolygon points='16,3 28,10 28,22 16,29 4,22 4,10' fill='%23FFD98A' stroke='%23FF8A5B' stroke-width='2'/%3E%3C/svg%3E">
<style>
/* ============================================================
   (a) リセット / ルート変数
   ============================================================ */
:root{
  --pink:#FBBFD6; --pink-soft:#FFE3EF; --pink-bg:#FCE9F1;
  --lav:#C9A7F0; --lav-deep:#7E5BD6;
  --sky:#A7E2F2; --sky-deep:#2C8FB0;
  --gold:#FFD98A; --amber:#FF8A5B; --rose:#F25C7A;
  --ink:#5B3A66; --ink-soft:#7d5b88;
  --hp-red:#F25C7A; --hp-amber:#FF8A5B;
  --panel-bg:rgba(255,255,255,.72);
  --shadow:0 4px 12px rgba(91,58,102,.14);
  --shadow-lg:0 8px 24px rgba(91,58,102,.20);
  --radius:20px; --radius-sm:14px;
  --gold-grad:linear-gradient(100deg,#FFD98A,#FF8A5B,#F25C7A,#FFD98A);
  --font:"Hiragino Maru Gothic ProN","Rounded Mplus 1c","Zen Maru Gothic","M PLUS Rounded 1c",system-ui,-apple-system,"Segoe UI",sans-serif;
}
*{box-sizing:border-box;}
html,body{
  margin:0; height:100%;
  overscroll-behavior:none; touch-action:manipulation;
  user-select:none; -webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
  font-family:var(--font);
  color:var(--ink);
}
body{
  background:linear-gradient(180deg,#FCE9F1 0%,#F3E2FB 45%,#E2F3FB 100%);
  overflow:hidden;
}
button{font-family:inherit;color:inherit;border:none;background:none;cursor:pointer;}
button:focus-visible{outline:3px solid var(--lav);outline-offset:2px;border-radius:8px;}

/* ============================================================
   (b) レイアウト
   ============================================================ */
#app{
  position:relative;
  width:100%;
  max-width:480px;
  height:100dvh;
  margin:0 auto;
  display:grid;
  /* 子: hud / battle / superBar / tabs / panel / titleBar(下部) の6行。battle(敵味方)に最低高さを保証し1frで伸長、
     panelは minmax(0,36dvh) で0まで縮んで内部スクロール(短い画面では下が縮む)。タイトルは最下段。 */
  grid-template-rows:auto minmax(clamp(140px,30dvh,240px),1fr) auto auto minmax(0,36dvh) auto;
  overflow:hidden;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  background:
    radial-gradient(circle at 50% 16%,rgba(255,217,138,0.42),transparent 58%),
    linear-gradient(180deg,#FCE9F1 0%,#F3E2FB 45%,#E2F3FB 100%);
}

/* 背景きらめき */
#bgStars{position:absolute;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.bgstar{position:absolute;animation:twinkle 3s ease-in-out infinite, drift 18s linear infinite;}
@keyframes twinkle{0%,100%{opacity:.2;transform:scale(.6);}50%{opacity:1;transform:scale(1);}}
@keyframes drift{from{transform:translateY(0);}to{transform:translateY(-10px);}}

/* ============================================================
   HUD
   ============================================================ */
/* タイトル(画面下部フッター) */
#titleBar{position:relative;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;padding:3px 10px calc(3px + env(safe-area-inset-bottom));}
#titleText{font-weight:900;font-size:13px;line-height:1.1;letter-spacing:.03em;color:var(--rose);text-shadow:0 1px 0 rgba(255,255,255,.7),0 0 10px rgba(255,217,138,.55);white-space:nowrap;}
#subTitle{font-weight:700;font-size:9.5px;line-height:1.2;letter-spacing:.05em;color:var(--ink-soft);white-space:nowrap;}
#hud{
  position:relative;z-index:5;
  margin:8px 8px 4px;
  padding:8px 12px;
  background:var(--panel-bg);
  border:2px solid var(--pink);
  border-radius:var(--radius);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  box-shadow:var(--shadow);
}
#hudTop{display:flex;align-items:center;gap:8px;}
.stageBlock{flex:1;min-width:0;}
.stageLabel{font-weight:800;font-size:14px;letter-spacing:.03em;display:flex;align-items:center;gap:6px;}
.bossTag{
  font-size:10px;font-weight:800;color:#fff;background:var(--gold-grad);
  background-size:200% 100%;animation:shimmer 1.6s linear infinite;
  padding:1px 7px;border-radius:10px;box-shadow:0 1px 4px rgba(242,92,122,.4);
}
.stageProg{height:6px;border-radius:6px;background:rgba(201,167,240,.3);margin-top:4px;overflow:hidden;}
.stageProg>div{height:100%;background:var(--gold-grad);background-size:200% 100%;border-radius:6px;transform-origin:left;transition:width .3s;}
.currBlock{display:flex;flex-direction:column;align-items:flex-end;gap:1px;}
.hhkRow{display:flex;align-items:center;gap:5px;font-weight:800;font-size:18px;}
.hhkRow .gem{width:18px;height:18px;flex:none;}
.hhkRow .val{
  background:var(--gold-grad);background-size:200% 100%;
  -webkit-background-clip:text;background-clip:text;color:transparent;
  animation:shimmer 2.6s linear infinite;
}
.dpsRow{font-size:11px;font-weight:700;color:var(--ink-soft);}
#soundBtn{
  width:38px;height:38px;flex:none;border-radius:50%;
  background:rgba(255,255,255,.85);border:2px solid var(--lav);
  display:flex;align-items:center;justify-content:center;font-size:18px;
  box-shadow:var(--shadow);transition:transform .12s;
}
#soundBtn.off{opacity:.6;filter:grayscale(.5);}
#soundBtn:active{transform:scale(.9);}
@keyframes shimmer{0%{background-position:0% 0;}100%{background-position:200% 0;}}

/* ボスHPバー */
#hpWrap{margin-top:8px;}
#hpbar{
  position:relative;height:22px;border-radius:12px;
  background:rgba(43,58,85,.16);overflow:hidden;
  border:2px solid rgba(255,255,255,.6);
}
#hpfill{
  position:absolute;inset:0;transform-origin:left;
  background:linear-gradient(90deg,#F25C7A,#FF8A5B);
  border-radius:10px;will-change:transform;
}
#hpText{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;color:#fff;text-shadow:0 1px 2px rgba(91,58,102,.6);
  letter-spacing:.02em;
}

/* ============================================================
   (c) バトル領域
   ============================================================ */
#battle{
  position:relative;z-index:2;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:0;
  will-change:transform;
}
#bossWrap{
  position:relative;width:min(58%,31dvh);max-width:280px;
  filter:drop-shadow(0 10px 14px rgba(91,58,102,.18));
  cursor:pointer;touch-action:manipulation;
  transform-origin:50% 60%;
}
#bossWrap svg{display:block;width:100%;height:auto;}
#bossSvgRoot{transform-origin:50% 60%;}
.tap-bounce{animation:tapBounce .12s ease-out;}
@keyframes tapBounce{0%{transform:scale(1);}35%{transform:scale(.95);}100%{transform:scale(1);}}
.boss-breathe{animation:floatBreath 3.4s ease-in-out infinite;}
@keyframes floatBreath{0%,100%{transform:translateY(0) scale(1,1);}50%{transform:translateY(-10px) scale(1.015,.985);}}
.boss-hurt{animation:hurtFlash .32s ease-out, bossShake .32s ease-out;}
@keyframes hurtFlash{0%{filter:none;}18%{filter:brightness(1.7) saturate(.2);}38%{filter:none;}100%{filter:none;}}
@keyframes bossShake{0%{transform:translateX(0);}25%{transform:translateX(-5px);}50%{transform:translateX(4px);}75%{transform:translateX(-2px);}100%{transform:translateX(0);}}
.boss-die{animation:defeatSquish .9s cubic-bezier(.6,-0.2,.3,1.4) forwards;}
@keyframes defeatSquish{
  0%{transform:scale(1) rotate(0);opacity:1;}
  30%{transform:scale(1.12,.85) rotate(0);}
  55%{transform:scale(.5,.5) rotate(8deg);opacity:1;}
  75%{transform:scale(.15,.15) rotate(-12deg);opacity:.8;}
  100%{transform:scale(0,0) rotate(-12deg);opacity:0;}
}
.boss-spawn{animation:bossSpawn .5s cubic-bezier(.2,.8,.3,1.2);}
@keyframes bossSpawn{0%{transform:scale(0) translateY(30px);opacity:0;}100%{transform:scale(1) translateY(0);opacity:1;}}

/* 仲間並び */
#partyRow{
  position:absolute;left:0;right:0;bottom:4px;z-index:3;   /* 主人公と同じ最前(下)に揃える=ウィンドウが変わっても一緒に動く */
  display:flex;justify-content:center;align-items:flex-end;gap:0;
  padding:0 4px;pointer-events:none;
}
.partyMini{width:17%;max-width:62px;min-width:0;transition:transform .15s;}
.pmSpacer{flex:0 0 min(24%,92px);align-self:stretch;}   /* 中央=主人公ぶんを空ける */
.pmGhost{visibility:hidden;}                              /* 左右の数を揃える透明枠(スペーサーを中央に) */
.partyMini svg{display:block;width:100%;height:auto;}
.pm-bob{animation:miniBob 2.3s ease-in-out infinite;}
@keyframes miniBob{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
.pm-attack{animation:miniAttack .3s ease-out;}
@keyframes miniAttack{0%{transform:translateY(0) scale(1);}40%{transform:translateY(-8px) scale(1.08);}100%{transform:translateY(0) scale(1);}}

/* 女の子SVGの小物アニメ(girlSvg内で付与されるクラス) */
.sway{animation:sway 3s ease-in-out infinite;transform-box:fill-box;transform-origin:top center;}
@keyframes sway{0%,100%{transform:rotate(-2deg);}50%{transform:rotate(2deg);}}
.twk{animation:twk 1.8s ease-in-out infinite;transform-box:fill-box;transform-origin:center;}
@keyframes twk{0%,100%{opacity:.5;transform:scale(.8);}50%{opacity:1;transform:scale(1.1);}}
.ahoge{animation:ahoge 2.4s ease-in-out infinite;transform-box:fill-box;transform-origin:bottom center;}
@keyframes ahoge{0%,100%{transform:rotate(-3deg);}50%{transform:rotate(3deg);}}
.spinring{animation:spinring 6s linear infinite;transform-box:fill-box;transform-origin:center;}
@keyframes spinring{to{transform:rotate(360deg);}}

/* 主人公(プレイヤー自身)— バトル下部中央でボスに対峙 */
#playerChar{
  position:absolute;left:50%;bottom:4px;
  width:min(22%,86px);z-index:5;pointer-events:none;
  transform:translateX(-50%);transform-origin:50% 100%;
  filter:drop-shadow(0 6px 8px rgba(91,58,102,.18));
}
#playerChar svg{display:block;width:100%;height:auto;}
#playerChar .pcBody{animation:pcIdle 2.8s ease-in-out infinite;transform-box:fill-box;transform-origin:50% 100%;}
@keyframes pcIdle{0%,100%{transform:translateY(0);}50%{transform:translateY(-2.5px);}}
#playerChar .pcSword{transform-box:fill-box;transform-origin:64px 96px;}
.player-attack{animation:playerAttack .22s ease-out;}
@keyframes playerAttack{
  0%{transform:translateX(-50%) translateY(0) scale(1);}
  35%{transform:translateX(-50%) translateY(-9px) scale(1.06,.96);}
  100%{transform:translateX(-50%) translateY(0) scale(1);}
}
.player-attack .pcSword{animation:playerSwing .22s ease-out;}
@keyframes playerSwing{0%{transform:rotate(14deg);}40%{transform:rotate(-34deg);}100%{transform:rotate(14deg);}}
.player-super{animation:playerSuper .5s cubic-bezier(.2,.8,.3,1.2);}
@keyframes playerSuper{
  0%{transform:translateX(-50%) translateY(0) scale(1) rotate(0);}
  30%{transform:translateX(-50%) translateY(-16px) scale(1.14,.92) rotate(-4deg);}
  60%{transform:translateX(-50%) translateY(-4px) scale(1.05) rotate(3deg);}
  100%{transform:translateX(-50%) translateY(0) scale(1) rotate(0);}
}
.player-super .pcSword{animation:playerSwingBig .5s cubic-bezier(.2,.8,.3,1.2);}
@keyframes playerSwingBig{0%{transform:rotate(20deg);}35%{transform:rotate(-52deg);}100%{transform:rotate(14deg);}}
/* 小さい画面: 敵をやや優先し、味方(主人公/仲間ミニ/中央スペーサー)を小さく */
@media(max-height:680px){ #playerChar{width:min(17%,60px);bottom:2px;} #partyRow{bottom:2px;} .partyMini{max-width:48px;} .pmSpacer{flex-basis:min(20%,66px);} }
@media(max-height:480px){ #playerChar{width:min(15%,50px);} .partyMini{max-width:40px;} .pmSpacer{flex-basis:min(18%,56px);} }

/* FXレイヤ */
#fxLayer{position:absolute;inset:0;z-index:8;pointer-events:none;overflow:hidden;}
.dmgnum{
  position:absolute;font-weight:800;font-size:22px;white-space:nowrap;
  pointer-events:none;will-change:transform,opacity;transform:translate(-50%,-50%);
  color:#fff;text-shadow:-1.5px 0 var(--ink),1.5px 0 var(--ink),0 -1.5px var(--ink),0 1.5px var(--ink),-2.5px 2.5px 0 var(--ink),0 1px 3px rgba(91,58,102,.55);
}
.dmgnum.crit{
  font-size:38px;
  background:linear-gradient(90deg,#FFD98A,#FF8A5B,#F25C7A,#C9A7F0);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:none;filter:drop-shadow(0 0 6px rgba(255,217,138,.9)) drop-shadow(0 2px 3px rgba(242,92,122,.5)) drop-shadow(0 0 1.2px rgba(91,58,102,.95)) drop-shadow(0 0 1.2px rgba(91,58,102,.95));
}
.dmgnum .critlbl{display:block;font-size:11px;text-align:center;letter-spacing:.08em;}
.dmgnum.auto{font-size:15px;font-weight:800;color:#DFF7FF;opacity:.95;
  text-shadow:-1px 0 #2C8FB0,1px 0 #2C8FB0,0 -1px #2C8FB0,0 1px #2C8FB0,0 1px 3px rgba(44,143,176,.5);}
/* オート(仲間)の会心: タップ会心より控えめ。中サイズのゴールド＋シアン縁取り＋小さな「会心」ラベル */
.dmgnum.acrit{font-size:24px;font-weight:900;color:#FFE9A6;
  text-shadow:-1.5px 0 #2C8FB0,1.5px 0 #2C8FB0,0 -1.5px #2C8FB0,0 1.5px #2C8FB0,0 0 7px rgba(255,217,138,.8);}
.dmgnum .critlbl.acl{display:block;font-size:9px;text-align:center;letter-spacing:.14em;color:#FFE9A6;opacity:.95;}
.dmgnum.super{font-size:clamp(42px,14vw,58px);font-weight:900;
  background:linear-gradient(90deg,#FFF4D0,#FFD98A,#FF8A5B,#F25C7A,#C9A7F0);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 0 12px rgba(255,217,138,1)) drop-shadow(0 3px 4px rgba(242,92,122,.6)) drop-shadow(0 0 1.5px rgba(91,58,102,.95)) drop-shadow(0 0 1.5px rgba(91,58,102,.95));}
.dmgnum.super .critlbl{font-size:16px;letter-spacing:.18em;}
/* 必殺技の斜め斬撃エフェクト(ズバシャーン) */
.superslash{position:absolute;left:-25%;top:46%;width:150%;height:16px;pointer-events:none;z-index:9;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.97),rgba(255,217,138,.92),rgba(255,255,255,.97),transparent);
  transform:translateY(-50%) rotate(-20deg);filter:blur(1px) drop-shadow(0 0 9px rgba(255,236,180,.95));
  opacity:0;animation:superSlash .42s ease-out forwards;}
@keyframes superSlash{0%{opacity:0;transform:translateY(-50%) rotate(-20deg) scaleX(.12);}22%{opacity:1;}100%{opacity:0;transform:translateY(-50%) rotate(-20deg) scaleX(1.18);}}
.particle{position:absolute;pointer-events:none;will-change:transform,opacity;transform:translate(-50%,-50%);}

/* 撃破フラッシュ・リング */
#flashLayer{position:absolute;inset:0;z-index:7;pointer-events:none;}
.bigflash{
  position:absolute;inset:0;
  background:radial-gradient(circle at 50% 50%,rgba(255,255,255,.9),rgba(255,217,138,.5) 40%,transparent 70%);
  animation:bigflash .3s ease-out forwards;
}
@keyframes bigflash{0%{opacity:0;}20%{opacity:1;}100%{opacity:0;}}
.shockring{
  position:absolute;border:3px solid var(--gold);border-radius:50%;
  width:60px;height:60px;transform:translate(-50%,-50%) scale(0);
  animation:shockring .55s ease-out forwards;
}
@keyframes shockring{0%{transform:translate(-50%,-50%) scale(0);opacity:1;}100%{transform:translate(-50%,-50%) scale(4);opacity:0;}}

/* 吹き出し */
#bubbleLayer{position:absolute;left:0;right:0;bottom:0;z-index:9;pointer-events:none;display:flex;flex-direction:column;justify-content:flex-end;align-items:stretch;gap:5px;padding:0 10px clamp(52px,13dvh,88px);}
.bubble.left{align-self:flex-start;}
.bubble.right{align-self:flex-end;}
/* 名乗りカットイン(敵の前面・大きく) */
#cutinLayer{position:absolute;inset:0;z-index:14;pointer-events:none;overflow:hidden;}
.cutin{position:absolute;left:0;right:0;top:33%;display:flex;flex-direction:column;align-items:center;gap:1px;padding:12px 6px;
  background:linear-gradient(90deg,rgba(91,58,102,0) 0%,rgba(91,58,102,.5) 12%,rgba(91,58,102,.72) 50%,rgba(91,58,102,.5) 88%,rgba(91,58,102,0) 100%);
  will-change:transform,opacity;animation:cutinSlide 1.9s cubic-bezier(.2,.9,.2,1) forwards;}
.cutin .cstage{font-size:clamp(14px,4.6vw,22px);font-weight:800;letter-spacing:.14em;color:#FFE9A6;text-shadow:0 2px 0 rgba(0,0,0,.28);}
.cutin .cboss{margin-left:.5em;font-size:.62em;background:linear-gradient(100deg,#F25C7A,#FF8A5B);color:#fff;padding:.12em .6em;border-radius:999px;letter-spacing:.08em;vertical-align:middle;}
.cutin .cname{font-size:clamp(24px,9vw,44px);font-weight:900;line-height:1.04;color:#fff;text-align:center;text-shadow:0 3px 0 rgba(242,92,122,.55),0 0 16px rgba(255,217,138,.85);}
.cutin .cname .bnMain,.cutin .cname .bnPlus{display:inline-block;white-space:nowrap;}/* 「○○竜バハムート」は語中で折らず、+Nは塊で次行へ */
.cutin .clv{color:#FFD98A;margin-right:.28em;}
@keyframes cutinSlide{0%{transform:translateX(-115%);opacity:0;}16%{transform:translateX(0);opacity:1;}78%{transform:translateX(0);opacity:1;}100%{transform:translateX(118%);opacity:0;}}
/* 長押し連打フィードバック(指の位置に「×N 連打中！」) */
#holdFx{position:fixed;left:0;top:0;transform:translate(-50%,-50%);z-index:60;pointer-events:none;
  background:linear-gradient(100deg,#FFD98A,#FF8A5B);color:#fff;font-weight:900;font-size:15px;
  padding:5px 13px;border-radius:999px;box-shadow:0 4px 12px rgba(242,92,122,.4);white-space:nowrap;
  opacity:0;transition:opacity .15s ease;text-shadow:0 1px 0 rgba(0,0,0,.15);}
#holdFx.show{opacity:1;}
#holdFx.pulse{animation:holdPop .18s ease-out;}
@keyframes holdPop{0%{transform:translate(-50%,-50%) scale(.85);}55%{transform:translate(-50%,-50%) scale(1.2);}100%{transform:translate(-50%,-50%) scale(1);}}
/* 長押し2秒のサークルタイマー(発動ディレイの進捗) */
#holdRing{position:fixed;left:0;top:0;transform:translate(-50%,-50%);z-index:61;pointer-events:none;width:56px;height:56px;display:flex;align-items:center;justify-content:center;}
#holdRing svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg);}
#holdRing .track{fill:rgba(91,58,102,.42);stroke:rgba(255,255,255,.45);stroke-width:5;}
#holdRing .prog{fill:none;stroke:#FFD98A;stroke-width:5;stroke-linecap:round;stroke-dasharray:125.7;stroke-dashoffset:125.7;animation:holdRingFill 1s linear forwards;}
#holdRing .hrIco{position:relative;font-size:19px;line-height:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,.35));}
#holdRing .hrCap{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);margin-bottom:6px;white-space:nowrap;font-size:11px;font-weight:800;color:#fff;background:rgba(91,58,102,.82);padding:3px 9px;border-radius:999px;box-shadow:0 2px 6px rgba(91,58,102,.35);}
#holdRing.burst{animation:holdRingBurst .22s ease-out forwards;}
@keyframes holdRingFill{to{stroke-dashoffset:0;}}
@keyframes holdRingBurst{0%{transform:translate(-50%,-50%) scale(1);opacity:1;}100%{transform:translate(-50%,-50%) scale(1.7);opacity:0;}}
/* クラスチェンジ発動の光る演出(押下位置に金色バースト＋星) */
.ccGlow{position:fixed;left:0;top:0;transform:translate(-50%,-50%);z-index:62;pointer-events:none;width:130px;height:130px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,.95) 0%,rgba(255,233,166,.85) 28%,rgba(255,217,138,.6) 48%,rgba(255,138,91,0) 72%);
  animation:ccGlowAnim .68s ease-out forwards;}
.ccGlow .ccStar{position:absolute;left:50%;top:50%;font-size:38px;transform:translate(-50%,-50%);filter:drop-shadow(0 0 8px #FFD98A);animation:ccStarAnim .68s ease-out forwards;}
@keyframes ccGlowAnim{0%{opacity:0;transform:translate(-50%,-50%) scale(.3);}25%{opacity:1;transform:translate(-50%,-50%) scale(1);}100%{opacity:0;transform:translate(-50%,-50%) scale(2);}}
@keyframes ccStarAnim{0%{opacity:0;transform:translate(-50%,-50%) scale(.4) rotate(-30deg);}40%{opacity:1;transform:translate(-50%,-50%) scale(1.25) rotate(0);}100%{opacity:0;transform:translate(-50%,-50%) scale(1.7) rotate(25deg);}}
.bubble{
  max-width:84%;background:rgba(255,255,255,.95);border:2px solid var(--pink);
  border-radius:16px;padding:6px 12px;font-size:12px;font-weight:700;
  box-shadow:var(--shadow);animation:bubbleIn .3s ease-out, bubbleOut .4s ease-in 2.6s forwards;
  display:flex;align-items:center;gap:7px;
}
.bubble .bname{font-weight:800;color:var(--rose);font-size:11px;flex:none;}
.bubble .bmini{width:26px;height:26px;flex:none;}
@keyframes bubbleIn{0%{transform:translateY(10px) scale(.8);opacity:0;}100%{transform:translateY(0) scale(1);opacity:1;}}
@keyframes bubbleOut{to{transform:translateY(-8px);opacity:0;}}

/* ============================================================
   (d) パネル / タブ
   ============================================================ */
#tabs{
  position:relative;z-index:5;
  display:flex;gap:6px;margin:4px 8px 0;padding:5px;
  background:var(--panel-bg);border:2px solid var(--pink);border-radius:var(--radius);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.tabBtn{
  flex:1;padding:8px 4px;border-radius:14px;font-weight:800;font-size:12.5px;
  color:var(--ink-soft);transition:all .15s;position:relative;
}
.tabBtn.active{color:var(--ink);background:#fff;box-shadow:var(--shadow);}
.tabBtn.active::after{
  content:"";position:absolute;left:22%;right:22%;bottom:3px;height:3px;border-radius:3px;
  background:var(--gold-grad);background-size:200% 100%;animation:shimmer 1.6s linear infinite;
}
.tabBtn .glow{position:absolute;top:2px;right:8px;width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold);animation:pulseGlow 1s ease-in-out infinite;}
@keyframes pulseGlow{0%,100%{transform:scale(.7);opacity:.6;}50%{transform:scale(1.2);opacity:1;}}

#panel{
  position:relative;z-index:5;
  margin:6px 8px calc(8px + env(safe-area-inset-bottom));
  background:var(--panel-bg);border:2px solid var(--pink);border-radius:var(--radius);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  box-shadow:var(--shadow);
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  min-height:0;   /* 高さはグリッドトラック(minmax(0,36dvh))が決定。短い画面では縮んでスクロール */
  padding:8px;
}
.panelHead{font-weight:800;font-size:13px;margin:2px 4px 8px;color:var(--ink-soft);display:flex;align-items:center;gap:6px;}

/* カード共通 */
.card{
  background:#fff;border-radius:var(--radius-sm);padding:9px 10px;margin-bottom:8px;
  box-shadow:0 2px 8px rgba(91,58,102,.08);display:flex;align-items:center;gap:9px;
}
.cardBody{flex:1;min-width:0;}
.cardTitle{font-weight:800;font-size:13.5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.cardTitle .lv{font-size:11px;font-weight:800;color:#fff;background:var(--lav);padding:1px 7px;border-radius:9px;}
.cardTitle .maxlv{background:var(--amber);}
.cardDesc{font-size:10.5px;color:var(--ink-soft);margin-top:2px;line-height:1.35;}
.cardEff{font-size:10.5px;color:var(--sky-deep);font-weight:700;margin-top:2px;}
.roleIcon{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex:none;background:var(--pink-soft);}
.buyBtn{
  flex:none;min-width:84px;padding:9px 8px;border-radius:13px;font-weight:800;font-size:12px;
  background:var(--gold-grad);background-size:200% 100%;color:#fff;
  box-shadow:0 3px 8px rgba(242,92,122,.35);transition:transform .1s,filter .1s;
  text-align:center;line-height:1.2;
}
.buyBtn:active{transform:scale(.94);}
.buyAllBtn{display:block;width:calc(100% - 8px);margin:0 4px 8px;padding:11px;border-radius:14px;font-weight:800;font-size:13px;color:#fff;background:var(--gold-grad);background-size:200% 100%;box-shadow:0 3px 8px rgba(242,92,122,.35);transition:transform .1s;}
.buyAllBtn:active{transform:translateY(1px) scale(.99);}
.buyBtn.locked{background:#d9cfe0;color:#fff;box-shadow:none;cursor:not-allowed;filter:grayscale(.3);}
.buyBtn .bc{display:flex;align-items:center;justify-content:center;gap:3px;font-size:11px;}
.buyBtn .bc .gem{width:12px;height:12px;}
.buyBtn small{display:block;font-size:9.5px;opacity:.9;font-weight:700;}

.girlMini{width:48px;height:60px;flex:none;}
.girlMini svg{display:block;width:100%;height:auto;}
.locktag{font-size:10px;color:var(--ink-soft);font-weight:700;}

/* 設定 */
.setRow{display:flex;align-items:center;justify-content:space-between;padding:10px 6px;border-bottom:1px solid rgba(201,167,240,.25);}
.setRow:last-child{border-bottom:none;}
.setRow .lbl{font-weight:700;font-size:13px;}
.setRow .sub{font-size:10px;color:var(--ink-soft);margin-top:2px;}
.toggle{
  width:48px;height:27px;border-radius:14px;background:#d9cfe0;position:relative;transition:background .2s;flex:none;
}
.toggle.on{background:var(--lav);}
.toggle::after{content:"";position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.toggle.on::after{transform:translateX(21px);}
.dangerBtn{width:100%;padding:12px;border-radius:14px;background:#fff;border:2px solid var(--rose);color:var(--rose);font-weight:800;font-size:13px;}
.dangerBtn:active{transform:scale(.97);}
.setLine{padding:10px 6px;font-size:11px;color:var(--ink-soft);line-height:1.5;}
.recGrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:2px 2px 10px;}
.recCell{background:#fff;border:1.5px solid var(--pink);border-radius:12px;padding:7px 9px;}
.recCell .k{font-size:10.5px;color:var(--ink-soft);font-weight:700;margin-bottom:1px;}
.recCell .v{font-size:15px;font-weight:800;color:var(--ink);}
.recHist{display:flex;flex-direction:column;gap:5px;}
.recRow{display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid var(--pink);border-radius:10px;padding:6px 9px;font-size:12px;}
.recRow .rt{color:var(--ink-soft);font-variant-numeric:tabular-nums;font-size:11px;min-width:60px;}
.recRow .rs{font-weight:800;color:var(--ink);min-width:30px;}
.recRow .rn{flex:1;color:var(--ink-soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.recRow .rr{font-weight:800;color:#E0792B;white-space:nowrap;}
.recRow.boss{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset;}

/* ============================================================
   (e) コンポーネント: トースト / モーダル
   ============================================================ */
#toastRoot{position:fixed;left:50%;bottom:calc(40dvh + 18px);transform:translateX(-50%);z-index:50;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none;width:92%;max-width:440px;}
.toast{
  background:rgba(91,58,102,.92);color:#fff;padding:9px 16px;border-radius:16px;
  font-size:12.5px;font-weight:700;box-shadow:var(--shadow-lg);text-align:center;
  animation:toastIn .3s ease-out, toastOut .4s ease-in forwards;animation-delay:0s, var(--life);
  max-width:100%;
}
.toast.warn{background:rgba(255,138,91,.95);}
.toast.error{background:rgba(242,92,122,.95);}
@keyframes toastIn{0%{transform:translateY(14px);opacity:0;}100%{transform:translateY(0);opacity:1;}}
@keyframes toastOut{to{transform:translateY(-8px);opacity:0;}}

#modalRoot{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(91,58,102,.4);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);}
#modalRoot.show{display:flex;animation:fadeIn .2s;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal{
  background:linear-gradient(180deg,#fff,#FFF4FA);border:3px solid var(--pink);
  border-radius:24px;padding:22px 20px;max-width:340px;width:100%;
  box-shadow:var(--shadow-lg);text-align:center;animation:modalIn .35s cubic-bezier(.2,.8,.3,1.2);
}
@keyframes modalIn{from{transform:scale(.8) translateY(20px);opacity:0;}to{transform:scale(1) translateY(0);opacity:1;}}
.modal h2{margin:0 0 8px;font-size:18px;font-weight:800;color:var(--rose);}
.modal p{margin:6px 0;font-size:13px;line-height:1.6;}
.modal .big{font-size:22px;font-weight:800;background:var(--gold-grad);background-size:200% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:shimmer 2.4s linear infinite;display:inline-block;}
.modalBtns{display:flex;gap:10px;margin-top:16px;}
.modalBtns button{flex:1;padding:12px;border-radius:14px;font-weight:800;font-size:13px;}
.mbtn-primary{background:var(--gold-grad);background-size:200% 100%;color:#fff;box-shadow:0 3px 8px rgba(242,92,122,.35);}
.mbtn-primary:active{transform:scale(.95);}
.mbtn-ghost{background:#fff;border:2px solid var(--lav);color:var(--ink);}
.mbtn-ghost:active{transform:scale(.95);}

/* オンボーディング */
#onboard{position:fixed;inset:0;z-index:55;display:none;align-items:center;justify-content:center;pointer-events:none;}
#onboard.show{display:flex;}
.obBubble{
  position:absolute;background:#fff;border:3px solid var(--gold);border-radius:18px;padding:12px 16px;
  font-size:14px;font-weight:800;max-width:240px;text-align:center;box-shadow:var(--shadow-lg);
  pointer-events:auto;color:var(--ink);
}
.obFinger{font-size:34px;animation:fingerPulse 1s ease-in-out infinite;display:inline-block;}
@keyframes fingerPulse{0%,100%{transform:scale(1) translateY(0);}50%{transform:scale(1.15) translateY(-6px);}}
.obSkip{margin-top:8px;font-size:11px;color:var(--ink-soft);text-decoration:underline;background:none;}

/* 必殺ゲージ */
#superBar{
  position:relative;z-index:5;margin:0 8px;height:0;overflow:hidden;
  transition:height .2s;
}
#superBar.active{height:34px;margin:2px 8px;}
.superWrap{
  position:relative;display:flex;align-items:center;gap:8px;height:34px;
  background:var(--panel-bg);border:2px solid var(--lav);border-radius:14px;
  padding:0 8px;overflow:hidden;
}
.superTrack{position:relative;flex:1;height:14px;border-radius:8px;background:rgba(201,167,240,.25);overflow:hidden;}
.superFill{position:absolute;left:0;top:0;bottom:0;width:0%;border-radius:8px;background:linear-gradient(90deg,#C9A7F0,#7E5BD6);transition:width .12s;}
.superLbl{font-size:10.5px;font-weight:800;color:var(--lav-deep);flex:none;}
#superBtn{
  flex:none;padding:6px 12px;border-radius:11px;font-weight:800;font-size:12px;color:#fff;
  background:var(--lav);box-shadow:0 2px 6px rgba(126,91,214,.4);transition:transform .1s,filter .15s;
}
#superBtn:active{transform:scale(.94);}
#superBtn.ready{background:var(--gold-grad);background-size:200% 100%;animation:shimmer 1.4s linear infinite;}
#superBtn:disabled{opacity:.55;filter:grayscale(.4);box-shadow:none;cursor:default;}

/* ============================================================
   (f)(g) アニメ無効 / reduced-motion
   ============================================================ */
.no-motion *{animation:none!important;transition:none!important;}
@media(max-height:680px){
  #app{grid-template-rows:auto minmax(clamp(120px,27dvh,200px),1fr) auto auto minmax(0,34dvh) auto;}
  #panel{min-height:0;}
  #bossWrap{max-width:200px;width:min(46%,21dvh);}
}
/* 極端に低い時: 敵味方エリアを優先確保(下パネルが縮む) */
@media(max-height:480px){
  #app{grid-template-rows:auto minmax(116px,1fr) auto auto minmax(0,42dvh) auto;}
}
@media(min-width:481px){
  #app{border-left:1px solid rgba(201,167,240,.4);border-right:1px solid rgba(201,167,240,.4);}
}
</style>
</head>
<body>
<main id="app">
  <div id="bgStars" aria-hidden="true"></div>

  <!-- HUD -->
  <header id="hud">
    <div id="hudTop">
      <div class="stageBlock">
        <div class="stageLabel"><span id="stageLabel">STAGE 1</span><span id="bossTag" class="bossTag" style="display:none">BOSS</span></div>

      </div>

  </header>

  <!-- バトル領域 -->
  <section id="battle">

  <div id="superBar"></div>

  <!-- タブ -->

    <button class="tabBtn" id="tab-upgrades" data-tab="upgrades" role="tab" aria-selected="false" aria-controls="panel">強化</button>
    <button class="tabBtn" id="tab-prestige" data-tab="prestige" role="tab" aria-selected="false" aria-controls="panel">転生</button>

  <!-- パネル -->

  <!-- タイトル(画面下部) -->
  <footer id="titleBar">
    <span id="titleText">✨ ヒヒイロカネ・クリッカー</span>
    <span id="subTitle">〜 バハムートの煌めき 〜</span>
  </footer>

  <div id="toastRoot" aria-live="polite"></div>
</main>
<div id="modalRoot"></div>
<div id="onboard"></div>

<script>
(()=>{
"use strict";
/* =====================================================================
   B1  CONFIG
   ===================================================================== */
const SAVE_KEY="hihiiro_clicker_save_v1";
const SAVE_KEY_BACKUP="hihiiro_clicker_save_v1_bak";
const VERSION=7;
const AUTOSAVE_MS=10000;
const SAVE_MIN_GAP_MS=2000;
const TICK_MS=100;
const AUTO_DMG_MS=320;   // 自動DPSダメージ数字の表示間隔(蓄積を間引いて表示)
const OFFLINE_CAP_MS=8*60*60*1000; // 8h
const HARD_CAP=Number.MAX_VALUE/1e10; // ≈1.8e298
const MAX_DMG_NUMS=26;
const MAX_PARTICLES=150;

// 強化(ショップ) — 設計の upgrades 全て
const UPGRADES=[
  {id:"tapPower",  name:"鋼の一撃",   icon:"⚔️", desc:"タップ1回あたりのダメージを底上げする。序盤の生命線。", baseCost:15,  growth:1.15, max:null,
    eff:lv=>`タップ +${lv*2} (現在の素ダメージ ${1+lv*2})`},
  {id:"critChance",name:"鋭利な刃",   icon:"🗡️", desc:"クリティカル発生率を上げる。気持ちよさ担当。",       baseCost:60,  growth:1.22, max:55,
    eff:lv=>`クリ率 ${(5+lv).toFixed(0)}% (基本5%+${lv}%)`},
  {id:"critDamage",name:"会心の極み", icon:"💥", desc:"クリティカル時の倍率を強化。一撃の爆発力UP。",       baseCost:120, growth:1.25, max:null,
    eff:lv=>`クリ倍率 ×${(2+lv*0.25).toFixed(2)}`},
  {id:"partyDps",  name:"号令の旗",   icon:"🚩", desc:"仲間全員の自動DPSをまとめて強化する。放置効率の要。", baseCost:200, growth:1.2,  max:null,
    eff:lv=>`総DPS +${(lv*8)}% (×${(1+lv*0.08).toFixed(2)})`},
  {id:"goldGain",  name:"霊金の祝福", icon:"✨", desc:"バハムート撃破で得るヒヒイロカネ獲得量を増やす。",   baseCost:250, growth:1.18, max:null,
    eff:lv=>`撃破報酬 +${lv*10}% (×${(1+lv*0.1).toFixed(2)})`},
  {id:"autoClick", name:"自動の腕輪", icon:"🌀", desc:"毎秒、自動でタップを発生させる。完全放置を後押し。",  baseCost:500, growth:1.28, max:20,
    eff:lv=>`毎秒 自動タップ ×${lv}（放置DPS +${lv*5}%相当）`},
];
const UPG_BY_ID={};UPGRADES.forEach(u=>UPG_BY_ID[u.id]=u);

// 仲間(女の子) — アート設計準拠
const GIRLS=[
  {id:"sakura_kenshi", name:"さくらん", title:"桜花の一閃・先鋒剣士", role:"剣", roleIcon:"⚔️",
   recruit:20,    baseDps:8,    lvBase:64,    palette:["#FBBFD6","#FFE0CF","#F25C7A","#FFD3E4"]},
  {id:"runaria_mahou", name:"るなりあ", title:"月詠みの大魔女・範囲術師", role:"魔", roleIcon:"🔮",
   recruit:120,   baseDps:12,   lvBase:96,    palette:["#C9A7F0","#FFE9DC","#7E5BD6","#E0CBF7"]},
  {id:"yumiri_kyuu",   name:"ゆみり",   title:"星詠みの狙撃手・連射弓兵", role:"弓", roleIcon:"🏹",
   recruit:600,   baseDps:12,   lvBase:96,    palette:["#A7E2F2","#FFE0CF","#2C8FB0","#CFF0F8"]},
  {id:"merry_kaifuku", name:"めりぃ",   title:"祈りの聖灯・癒し手", role:"癒", roleIcon:"💗",
   recruit:3000,  baseDps:18,   lvBase:144,   palette:["#FFD98A","#FFE9DC","#FFB347","#FFE9B0"]},
  {id:"komugi_dageki", name:"こむぎ",   title:"豪天の小さき拳・打撃姫", role:"打", roleIcon:"👊",
   recruit:12000, baseDps:22,   lvBase:176,   palette:["#FF8A5B","#FFE0CF","#E0532C","#FFB089"]},
  {id:"sora_shien",    name:"そら",     title:"虹彩の歌い手・支援者", role:"支", roleIcon:"🎵",
   recruit:60000, baseDps:28,   lvBase:224,   palette:["#7FD8E8","#FFE9DC","#5B8FE0","#C2EEF5"]},
];
const GIRL_BY_ID={};GIRLS.forEach(g=>GIRL_BY_ID[g.id]=g);
// 加入解放ステージ(到達最高)
const RECRUIT_STAGE=[1,6,12,20,30,42];
// ===== 仲間バランス: 線形成長 + クラスチェンジ(段位) =====
const LCAP=25;                     // 段位内レベル上限(=長押し連打が必ずここで止まる)
const NCLASS=5;                    // 段位数 tier 0..4(=4回クラスチェンジ)
const DPS_SLOPE=0.12;              // レベルあたりDPS線形増分(段内 L1→L25 で約3.88倍)
const CLASSMULT=[1,4,16,64,256];   // 段位倍率(×4/段 > 段内3.88倍 ⇒ クラスチェンジは常に純増。DPS/コスト共通)
const COST_C1=1.0, COST_C2=0.5;    // レベルコスト2次式: lvBase*CM*(C1*L+C2*L^2)
const CC_BASE=[640,960,960,1440,1760,2240]; // クラスチェンジ基準コスト(仲間index, 戦力比に整合)
const CC_GROWTH=5.0;               // クラスチェンジコストの段倍率
const CC_STAGE=[9,14,20,28,38,50]; // 初回CC解放stage(仲間index)

function clamp(v,lo,hi){if(!Number.isFinite(v))return lo;return v<lo?lo:(v>hi?hi:v);}

/* ===== 大数(仮数部+指数)型 Big: floatの上限(~1.8e308)を超える値を扱う。値は非負前提(HP/報酬/DPS/所持ヒヒ等)。
   m∈[1,10)(0なら m=0)、e は通常のJS数値(指数。事実上無制限)。乗算=指数加算で巨大値も保持。 ===== */
function Bg(x){ if(x instanceof Big) return x; if(x&&typeof x==="object"&&("m" in x)) return Big._n((+x.m)||0,(+x.e)||0); return Big.from(x); }   // {m,e}(保存復元)も受理
class Big{
  constructor(m,e){ this.m=m; this.e=e; }
  static from(n){ if(n instanceof Big) return n; n=+n; if(!(n>0)) return new Big(0,0); if(!isFinite(n)) return new Big(1,1e308); const e=Math.floor(Math.log10(n)); return new Big(n/Math.pow(10,e), e); }
  static _n(m,e){ if(!(m>0)||!isFinite(m)) return new Big(0,0); if(!isFinite(e)) return new Big(1,1e308); const d=Math.floor(Math.log10(m)); return new Big(m/Math.pow(10,d), e+d); }
  static log(L){ if(!isFinite(L)) return L>0?new Big(1,1e308):new Big(0,0); const e=Math.floor(L); return new Big(Math.pow(10,L-e), e); }   // = 10^L
  add(x){ let a=this,b=Bg(x); if(a.m===0)return b; if(b.m===0)return a; if(a.e<b.e){const t=a;a=b;b=t;} const d=a.e-b.e; if(d>16)return a; return Big._n(a.m+b.m*Math.pow(10,-d), a.e); }
  sub(x){ const a=this,b=Bg(x); if(b.m===0)return a; if(a.m===0)return new Big(0,0); const d=a.e-b.e; if(d<0)return new Big(0,0); if(d>16)return a; const m=a.m-b.m*Math.pow(10,-d); if(m<=1e-12)return new Big(0,0); return Big._n(m,a.e); }
  mul(x){ const b=Bg(x); if(this.m===0||b.m===0)return new Big(0,0); return Big._n(this.m*b.m, this.e+b.e); }
  div(x){ const b=Bg(x); if(this.m===0)return new Big(0,0); if(b.m===0)return new Big(1,1e308); return Big._n(this.m/b.m, this.e-b.e); }
  pow(p){ if(this.m===0)return p===0?new Big(1,0):new Big(0,0); return Big.log(p*this.log10()); }
  cmp(x){ const b=Bg(x); if(this.m===0&&b.m===0)return 0; if(this.m===0)return -1; if(b.m===0)return 1; if(this.e!==b.e)return this.e<b.e?-1:1; return this.m<b.m?-1:(this.m>b.m?1:0); }
  gte(x){return this.cmp(x)>=0;} gt(x){return this.cmp(x)>0;} lte(x){return this.cmp(x)<=0;} lt(x){return this.cmp(x)<0;}
  max(x){const b=Bg(x);return this.cmp(b)>=0?this:b;}
  floor(){ if(this.m===0||this.e>=15)return this; return Big.from(Math.floor(this.toNumber())); }
  toNumber(){ if(this.m===0)return 0; if(this.e>308)return Infinity; if(this.e<-323)return 0; return this.m*Math.pow(10,this.e); }
  log10(){ return this.m===0?-Infinity:(Math.log10(this.m)+this.e); }
  isZero(){ return this.m===0; }
  toJSON(){ return {m:this.m,e:this.e}; }
}
function powB(base,p){ return base>0 ? Big.log(p*Math.log10(base)) : new Big(0,0); }   // base(number)^p → Big
function toBig(v){ if(v instanceof Big) return v; if(v&&typeof v==="object"&&("m" in v)) return Big._n((+v.m)||0,(+v.e)||0); return Big.from((+v)||0); }
const BIG0=new Big(0,0), BIG1=new Big(1,0);

// 日本語の万進単位(万〜無量大数=10^68)。大きい順に並べ、最初に一致した単位を採用。
const JP_UNITS=[
  {v:1e68,s:"無量大数"},{v:1e64,s:"不可思議"},{v:1e60,s:"那由他"},{v:1e56,s:"阿僧祇"},
  {v:1e52,s:"恒河沙"},{v:1e48,s:"極"},{v:1e44,s:"載"},{v:1e40,s:"正"},
  {v:1e36,s:"澗"},{v:1e32,s:"溝"},{v:1e28,s:"穣"},{v:1e24,s:"杼"},
  {v:1e20,s:"垓"},{v:1e16,s:"京"},{v:1e12,s:"兆"},{v:1e8,s:"億"},{v:1e4,s:"万"}
];
const EN_UNITS=[ {v:1e15,s:"Qa"},{v:1e12,s:"T"},{v:1e9,s:"B"},{v:1e6,s:"M"},{v:1e3,s:"K"} ];
// <1e72 を通常の万進単位で(無量大数まで)。n は通常number(非負)。
function fmtSmall(n){
  if(n<1000) return (n<10&&n%1!==0)?n.toFixed(1):String(Math.floor(n));
  if(n<1e4) return String(Math.floor(n));
  for(const x of JP_UNITS){ if(n>=x.v){ const r=n/x.v; return (r<100?r.toFixed(2):r.toFixed(1)).replace(/\.?0+$/,"")+x.s; } }
  return String(Math.floor(n));
}
// >=1e72: 「残り × (無量大数)^E」を入れ子の無表記で。L=log10(値)。E自体が大きいと再帰して「無無…」。
function fmtMu(L){
  const E=Math.floor(L/68), cL=L-68*E;          // E=無量大数の冪数, cL=残りのlog10([0,68))
  const cStr=(cL<1e-6)?"":fmtSmall(Math.pow(10,cL))+" ";   // 残りが1なら省略
  const eStr=(E<1e68)? fmtSmall(E)+"無" : fmtMu(Math.log10(E))+"無";  // 冪数が無量大数以上なら入れ子→無無
  return cStr+eStr;
}
function formatNumber(x){
  if(x==null) return "0";
  if(typeof x==="object" && !(x instanceof Big) && ("m" in x)) x=toBig(x);   // 保存復元した{m,e}(討伐履歴の報酬等)もそのまま表示
  const isB=(x instanceof Big);
  if(!isB){ if(Number.isNaN(x)) return "0"; if(!Number.isFinite(x)) return "∞"; }
  let neg=false, L;
  if(isB){ if(x.isZero()) return "0"; L=x.log10(); }
  else { neg=x<0; x=Math.abs(x); if(x===0) return "0"; L=Math.log10(x); }
  let out;
  if(L<72){ out=fmtSmall(isB?x.toNumber():x); }   // <1e72: 通常表記(無量大数まで)
  else { out=fmtMu(L); }                          // 以降: 無入れ子表記(無限)
  return neg?"-"+out:out;
}

const safeJSON={
  parse(s){try{return JSON.parse(s);}catch(e){return null;}},
  stringify(o){try{return JSON.stringify(o,(k,v)=>k==="_"||k.startsWith("_")?undefined:v);}catch(e){return "";}}

// 数式 (HP/報酬は Big。コストは小さいので Number のまま=比較/減算でBigへ自動coerce)
function bahamutHp(stage){
  let hp=Bg(8).mul(powB(1.13,stage-1));
  if(stage%5===0) hp=hp.mul(3);
  return hp.floor();
}
function isBossStage(stage){return stage%5===0;}
function rewardFor(stage){
  const gainLv=state.upgrades.goldGain||0;
  let r=Bg(6).mul(powB(1.15,stage-1)).mul(1+gainLv*0.10).mul(prestigeMult());
  if(stage%5===0) r=r.mul(2);
  return r.floor();
}
function costOf(kind,id,level,tier){
  if(kind==="upgrade"){const u=UPG_BY_ID[id];if(!u)return Infinity;if(u.max!=null&&level>=u.max)return Infinity;if(level<0)return Infinity;return Bg(u.baseCost).mul(powB(u.growth,level)).floor();}  // Big: 上限なし強化はlevelで指数増 → Math.powのfloat上限(∞化)を回避
  // 仲間レベル: 段位内2次コスト(線形DPS×2次コストで連打は必ず失速)。L>=LCAP は Infinity(=長押し停止/クラスチェンジ待ち)
  const g=GIRL_BY_ID[id]; if(!g)return Infinity;
  if(level<0||level>=LCAP) return Infinity;
  const T=tier||0;
  return Math.floor(g.lvBase*CLASSMULT[T]*(COST_C1*level+COST_C2*level*level));
}
// 累積コスト(等比級数) levelから count 回
function cumulativeCost(base,growth,fromLv,count){
  // Σ_{i=fromLv}^{fromLv+count-1} floor(base*growth^i) ≈ base*growth^fromLv*(growth^count-1)/(growth-1)
  const first=base*Math.pow(growth,fromLv);
  const sum=first*(Math.pow(growth,count)-1)/(growth-1);
  return Math.floor(sum);
}

function load(){
  let raw=null;
  try{ const s=localStorage.getItem(SAVE_KEY); if(s) raw=safeJSON.parse(s); }catch(e){raw=null;}
  if(!raw||typeof raw!=="object"){
    try{ const b=localStorage.getItem(SAVE_KEY_BACKUP); if(b) raw=safeJSON.parse(b); }catch(e){raw=null;}
  }
  if(!raw||typeof raw!=="object") return newState();
  try{ return migrate(raw); }catch(e){ return newState(); }
}
function deepMergeDefaults(target,defaults){
  for(const k in defaults){
    if(defaults[k]&&typeof defaults[k]==="object"&&!Array.isArray(defaults[k])){
      if(typeof target[k]!=="object"||target[k]==null) target[k]={};
      deepMergeDefaults(target[k],defaults[k]);
    } else if(!(k in target)){
      target[k]=defaults[k];
    }
  }
  return target;
}
function sanitizeNum(v,def){return Number.isFinite(v)?v:def;}
function migrate(raw){
  let v=Number(raw.version)||1;
  // 旧バージョン差分はここで段階処理(将来用)
  if(v<2){ if(!raw.prestige) raw.prestige={cores:0,lifeEarned:0,count:0}; v=2; }
  if(v<3){ if(!raw.settings) raw.settings={}; if(raw.settings.motion===undefined) raw.settings.motion=true; v=3; }
  if(v<4){ if(!raw.settings) raw.settings={}; raw.settings.bgm=true; v=4; } // BGM追加: 既存セーブもONで体験
  if(v<5){ // クラスチェンジ導入: tier付与。旧式(指数・level上限なし)のlevel>LCAPはtierへ換算しDPS急落を緩和
    if(raw.girls&&typeof raw.girls==="object"){
      for(const id in raw.girls){ const cur=raw.girls[id]; if(!cur||cur.tier!==undefined) continue;
        const lv=Math.max(1,Math.floor(sanitizeNum(cur.level,1)));
        if(lv>LCAP){ cur.tier=Math.min(NCLASS-1,Math.floor((lv-1)/LCAP)); cur.level=((lv-1)%LCAP)+1; }
        else cur.tier=0;
      }
    }
    v=5;
  }
  if(v<6){ // 転生を加算式(mult)→指数式(cores=桁数, 倍率×PRES_FACTOR^cores)へ。旧mult(最大~200)の実効倍率×(1+mult)を保存
    if(raw.prestige){
      const oldMult=Math.max(0,sanitizeNum(raw.prestige.mult,0));
      const nc=Math.max(0,Math.ceil(Math.log(1+oldMult)/Math.log(PRES_FACTOR)));  // ×PRES_FACTOR^nc ≥ 1+oldMult(切り上げ=旧プレイヤー有利)
      raw.prestige.cores=nc;
      raw.prestige.lifeEarned=Math.pow(10,nc+PRES_LOG0);   // 以降の桁数計算が nc を再現
      delete raw.prestige.mult;
    }
    v=6;
  }
  // 既定値で欠損補完
  const base=newState();
  deepMergeDefaults(raw,base);
  // upgrades 正規化(既知idのみ)
  const upg={};for(const u of UPGRADES){upg[u.id]=Math.max(0,Math.floor(sanitizeNum(raw.upgrades[u.id],0)));}
  raw.upgrades=upg;
  // girls 正規化
  const girls={};for(const g of GIRLS){const cur=raw.girls&&raw.girls[g.id];if(cur&&cur.owned){girls[g.id]={owned:true,level:clamp(Math.floor(sanitizeNum(cur.level,1)),1,LCAP),tier:clamp(Math.floor(sanitizeNum(cur.tier,0)),0,NCLASS-1)};}}
  raw.girls=girls;
  // 大数フィールドは Big へ(旧Numberセーブ/新{m,e}セーブ両対応)
  raw.hihiirokane=toBig(raw.hihiirokane);
  raw.totalEarned=toBig(raw.totalEarned);
  raw.prestige.lifeEarned=toBig(raw.prestige.lifeEarned);
  raw.prestige.cores=Math.max(0,Math.floor(sanitizeNum(raw.prestige.cores,0)));
  raw.prestige.count=Math.max(0,Math.floor(sanitizeNum(raw.prestige.count,0)));
  // 必殺ゲージ sanitize
  if(!raw.super||typeof raw.super!=="object") raw.super={charge:0,max:30};
  raw.super.max=Math.max(1,Math.floor(sanitizeNum(raw.super.max,30)));
  raw.super.charge=clamp(Math.floor(sanitizeNum(raw.super.charge,0)),0,raw.super.max);
  raw.stage.index=Math.max(1,Math.floor(sanitizeNum(raw.stage.index,1)));
  raw.stage.highest=Math.max(raw.stage.index,Math.floor(sanitizeNum(raw.stage.highest,1)));
  raw.lastSeen=sanitizeNum(raw.lastSeen,nowMs());
  raw.version=VERSION;
  return raw;
}
function save(reason){
  const t=nowMs();
  // throttle: forceでなければ最短間隔を守る(連打/頻発対策)
  if(reason!=="force" && t-D.lastSaveAt<SAVE_MIN_GAP_MS) return false;
  try{
    state.lastSeen=t;
    const json=safeJSON.stringify(state);
    if(!json) throw new Error("stringify failed");
    // バックアップ世代
    try{const prev=localStorage.getItem(SAVE_KEY);if(prev)localStorage.setItem(SAVE_KEY_BACKUP,prev);}catch(e){}
    localStorage.setItem(SAVE_KEY,json);
    D.saveDirty=false; D.lastSaveAt=t;
    return true;
  }catch(e){
    toast("保存に失敗しました(容量/権限)",{type:"warn"});
    return false;
  }
}
function applyOfflineProgress(now){
  let elapsed=now-state.lastSeen;
  if(!Number.isFinite(elapsed)||elapsed<0) elapsed=0;
  elapsed=Math.min(elapsed,OFFLINE_CAP_MS);
  if(elapsed<60000) return {elapsedMs:elapsed,goldGained:BIG0,kills:0,stagesGained:0}; // 1分未満は無視
  const dps=Bg(D.dps);
  if(dps.isZero()) return {elapsedMs:elapsed,goldGained:BIG0,kills:0,stagesGained:0};
  // 経過時間ぶんの総ダメージを、各ステージの実HPを順次差し引きながら討伐ループで消費。
  let remainingDmg=dps.mul(elapsed/1000);   // Big
  let kills=0, gold=BIG0, stagesGained=0;
  const startStage=state.stage.index;
  let curHp=state.bahamut.hp; // 進行中ボスの残HPから充当
  if(!(curHp instanceof Big)||curHp.isZero()) curHp=bahamutHp(state.stage.index);
  const MAX_STEPS=200000; // 暴走防止(OFFLINE_CAP_MSに加えた二重の保険)
  let steps=0;
  while(!remainingDmg.isZero() && steps++<MAX_STEPS){
    if(remainingDmg.lt(curHp)){ state.bahamut.hp=curHp.sub(remainingDmg); remainingDmg=BIG0; break; }
    remainingDmg=remainingDmg.sub(curHp);
    kills++;
    gold=gold.add(rewardFor(state.stage.index));
    state.stage.index++;
    stagesGained++;
    if(state.stage.index>state.stage.highest) state.stage.highest=state.stage.index;
    curHp=bahamutHp(state.stage.index);
    state.bahamut.hp=curHp;
  }
  // maxHp/tier/HP整合を再導出(stage.index更新後)
  setupStage_keepHp();
  if(!gold.isZero()){
    state.hihiirokane=Bg(state.hihiirokane).add(gold);
    state.totalEarned=Bg(state.totalEarned).add(gold);
  }
  if(stagesGained>0) recomputeDerived(); // 報酬式(goldGain/prestige連動)・DPS再計算
  if(gold>0||stagesGained>0){ D.dirtyHUD=true; D.dirtyPanel=true; D.saveDirty=true; }
  return {elapsedMs:elapsed,goldGained:gold,kills:kills,stagesGained:stagesGained,startStage:startStage};
}

   ===================================================================== */
function girlDps(g,tier,level){ const T=tier||0; return g.baseDps*CLASSMULT[T]*(1+(level-1)*DPS_SLOPE); }  // Number(小)。転生倍率は computeDPS で Big 化
function computeDPS(){   // → Big
  let sum=0;
  for(const g of GIRLS){
    const st=state.girls[g.id];
    if(st&&st.owned){ sum+=girlDps(g,st.tier||0,st.level); }
  }
  const partyBonus=1+(state.upgrades.partyDps||0)*0.08;
  const pres=prestigeMult();   // Big
  const cr=getCrit(); const critFactor=1+cr.chance*(cr.mult-1);   // 会心期待値(仲間の自動攻撃にも反映)
  const girlsDPS=pres.mul(sum*partyBonus*critFactor); // 仲間由来DPS(会心込み・自動の腕輪を含まない) Big
  // 自動の腕輪: 毎秒lv回の自動タップ。実タップ相当(素タップ威力＋会心期待)＋仲間DPSの一定割合。
  const autoLv=state.upgrades.autoClick||0;
  let autoDPS=BIG0;
  if(autoLv>0){
    const rawTap=1+(state.upgrades.tapPower||0)*2;        // 素タップ威力(転生前)
    const perTap=pres.mul(rawTap*critFactor).add(girlsDPS.mul(AUTO_PARTY_FRACTION));  // 自動タップ1回の価値 Big
    autoDPS=perTap.mul(autoLv);
  }
  return girlsDPS.add(autoDPS);
}
function computeTapDamage(){   // → Big
  const lv=state.upgrades.tapPower||0;
  return prestigeMult().mul(1+lv*2).floor();
}
// タップにDPS連動分を上乗せする割合(火力インフレへの追随)
const TAP_DPS_FRACTION=0.5;
// 自動の腕輪: 1レベルあたり「仲間DPSの何割」を自動タップ寄与として加算するか(Lv20で×1.0=放置DPS約2倍)
const AUTO_PARTY_FRACTION=0.05;
function recomputeDerived(){
  const baseTap=computeTapDamage();   // Big
  D.dps=computeDPS();                 // Big
  // 確定DPSの一定割合をタップ威力へ後加算(中盤以降もタップを有意味化)
  D.tapDmg=baseTap.add(D.dps.mul(TAP_DPS_FRACTION));   // Big
  D.goldMult=1; // 報酬式に gainLv を内包しているので 1
  D.dirtyHUD=true; D.dirtyPanel=true;
}
function getCrit(){
  const chance=clamp(0.05+(state.upgrades.critChance||0)*0.01,0,0.60);

}

// 安い順にまとめて強化: 所持ヒヒで買えるもの(強化Lv/仲間Lv/加入/クラスチェンジ)を最安から自動購入。副作用は最後に一括。
function buyAllCheapest(){
  let bought=0, spent=BIG0, guard=0;   // コストはBig/Number混在 → 全てBigで比較・集計
  while(guard++<200000){
    let bc=null, bk=null, bid=null;   // bc: 買える中で最安のコスト(Big)
    const bal=Bg(state.hihiirokane);
    const consider=(cost,kind,id)=>{ const cB=Bg(cost); if(bal.gte(cB) && (bc===null||cB.lt(bc))){ bc=cB; bk=kind; bid=id; } };
    for(const u of UPGRADES){ const lv=state.upgrades[u.id]||0; if(u.max!=null&&lv>=u.max) continue;
      consider(costOf("upgrade",u.id,lv),"upg",u.id); }
    for(let i=0;i<GIRLS.length;i++){ const g=GIRLS[i], st=state.girls[g.id];
      if(!st||!st.owned){ if(state.stage.highest>=RECRUIT_STAGE[i]) consider(g.recruit,"recruit",g.id); }
      else if(st.level<LCAP){ consider(costOf("girl",g.id,st.level,st.tier),"glv",g.id); }
      else if(canClassChange(g.id)){ consider(classChangeCost(g.id),"cc",g.id); } }
    if(!bk) break;
    state.hihiirokane=Bg(state.hihiirokane).sub(bc); spent=spent.add(bc);
    if(bk==="upg") state.upgrades[bid]=(state.upgrades[bid]||0)+1;
    else if(bk==="recruit") state.girls[bid]={owned:true,level:1,tier:0};
    else if(bk==="glv") state.girls[bid].level++;
    else { const st=state.girls[bid]; st.tier++; st.level=1; }
    bought++;
  }
  if(bought>0){ recomputeDerived(); D.saveDirty=true; D.dirtyHUD=true; D.dirtyPanel=true; blip(760,0.08);
    toast(`安い順にまとめて強化：${formatNumber(bought)}件 / ${formatNumber(spent)} 消費✨`,{ms:2400}); }
  else toast("いま買えるものがないよ",{type:"info"});
  return bought;
}

// ----- ダメージ数字 / 粒子プール -----
const fxLayer=()=>document.getElementById("fxLayer");
const dmgPool=[]; const partPool=[];
const activeDmg=[]; const activeParts=[];
function getDmgEl(){
  let e=dmgPool.pop();
  if(!e){e=document.createElement("div");e.className="dmgnum";fxLayer().appendChild(e);}
  return e;
}
function getPartEl(){
  let e=partPool.pop();
  if(!e){e=document.createElement("div");e.className="particle";fxLayer().appendChild(e);}
  return e;
}
function rectCenter(){
  const w=document.getElementById("bossWrap");
  const layer=fxLayer();
  if(!w||!layer) return {x:180,y:160};
  const wr=w.getBoundingClientRect(), lr=layer.getBoundingClientRect();
  return {x:wr.left-lr.left+wr.width/2, y:wr.top-lr.top+wr.height*0.45};
}
// ダメージ数字の表示アンカー: 顔(中央)を避けて頭上の帯に出す
function dmgAnchor(){
  const w=document.getElementById("bossWrap");
  const layer=fxLayer();
  if(!w||!layer) return {x:180,y:60};
  const wr=w.getBoundingClientRect(), lr=layer.getBoundingClientRect();
  return {x:wr.left-lr.left+wr.width/2, y:wr.top-lr.top+wr.height*0.15};  // 顔(0.45h)より上=頭上
}
function spawnDamageNumber(amount,x,y,isCrit,auto,superHit){
  if(!state.settings.damageNumbers) return;
  // x,y はレイヤ内座標が渡される運用(tapAttack側で変換済み)。null時は中央を採用。autoは散らして表示。
  const a=dmgAnchor();
  const px=(x==null)?a.x+(Math.random()*(auto?96:72)-(auto?48:36)):x;   // 顔を避け頭上で横に散らす
  const py=(y==null)?a.y+(Math.random()*36-14):y;                        // 頭上の帯(顔より上)
  if(activeDmg.length>=MAX_DMG_NUMS){ const old=activeDmg.shift(); retireDmg(old); }
  const e=getDmgEl();
  const autoCrit=isCrit&&auto&&!superHit;   // オート(仲間)の会心は控えめ専用スタイル(タップ会心 CRITICAL! と区別)
  e.className="dmgnum"+(superHit?" crit super":autoCrit?" acrit":isCrit?" crit":auto?" auto":"");
  e.innerHTML=(superHit?'<span class="critlbl">✦必殺✦</span>':autoCrit?'<span class="critlbl acl">会心</span>':isCrit?'<span class="critlbl">CRITICAL!</span>':"")+formatNumber(amount);
  e.style.left=px+"px"; e.style.top=py+"px"; e.style.opacity="1";
  e.style.transform="translate(-50%,-50%)";
  activeDmg.push({el:e,x:px,y:py,t:0,life:superHit?1300:(autoCrit?760:(isCrit?1000:(auto?620:800))),dx:(Math.random()*30-15),isCrit:isCrit||superHit});
}
function retireDmg(o){ o.el.style.opacity="0"; dmgPool.push(o.el); }
const SPARK_COLORS=["#FFD98A","#FFFFFF","#FF8A5B","#C9F0F7","#F25C7A"];

  if(!state.settings.motion) return;

// ヒヒイロカネの金の延べ棒(インゴット)。撃破時に大量に噴き出す花火演出。

// 上向きに噴き出して重力で弧を描き、回転しながら降り注ぐ「金の延べ棒の雨」。
// 多めの本数を数波に分けて出すことで“たくさん溢れ出す”感を出す。motion設定とMAX_PARTICLESで安全に上限。
function goldBarBurst(isBoss){
  if(!state.settings.motion) return;
  const c=rectCenter();
  const waves=isBoss?3:2;
  const perWave=isBoss?16:11;
  for(let w=0;w<waves;w++){
    setTimeout(function(){
      for(let i=0;i<perWave;i++){
        if(activeParts.length>=MAX_PARTICLES) break;
        const e=getPartEl();
        const sz=15+Math.random()*11;
        e.innerHTML=goldBarSVG(sz);
        e.style.left=c.x+"px"; e.style.top=c.y+"px"; e.style.opacity="1";
        const ang=-Math.PI/2+(Math.random()-0.5)*1.8;   // 上向き噴水(±約51°)
        const spd=155+Math.random()*200;
        activeParts.push({el:e,x:c.x,y:c.y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,g:560,t:0,life:1200+Math.random()*650,rot:Math.random()*360,vr:Math.random()*680-340});
      }
    }, w*110);
  }
  if(state.settings.sound && isBoss) setTimeout(function(){ blip(1040,0.12); },130);
}
// 財宝ザクザクSE: 高音のきらめき連鎖(しゃらんしゃらん)+低音の重み(じゃらん)。WebAudioのみ。
function treasureSE(isBoss){
  if(!state.settings.sound||!D.audioReady||!D.audioCtx) return;
  try{
    const ctx=D.audioCtx, t0=ctx.currentTime;
    const hi=[1568,1760,2093,2349,2637,3136];           // 高音ペンタ(きらめき)
    const n=isBoss?20:13;
    for(let i=0;i<n;i++){
      const t=t0 + i*0.034 + Math.random()*0.018;        // コインが連なって落ちる感じ
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.type= Math.random()<0.5?"triangle":"sine";
      o.frequency.value= hi[(Math.random()*hi.length)|0] * (Math.random()<0.4?0.5:1);
      const vol=0.045+Math.random()*0.05;
      g.gain.setValueAtTime(0.0001,t);
      g.gain.exponentialRampToValueAtTime(vol,t+0.005);
      g.gain.exponentialRampToValueAtTime(0.0001,t+0.11+Math.random()*0.1);
      o.connect(g); g.connect(ctx.destination); o.start(t); o.stop(t+0.26);
    }
    // 低音の "じゃらん"(財宝の重み)
    const bo=ctx.createOscillator(), bg=ctx.createGain();
    bo.type="triangle"; bo.frequency.value=isBoss?170:210;
    bg.gain.setValueAtTime(0.0001,t0);
    bg.gain.exponentialRampToValueAtTime(0.13,t0+0.02);
    bg.gain.exponentialRampToValueAtTime(0.0001,t0+0.42);
    bo.connect(bg); bg.connect(ctx.destination); bo.start(t0); bo.stop(t0+0.46);
  }catch(e){}
}
function defeatBurst(reward,isBoss){
  if(state.settings.motion){
    const c=rectCenter();
    goldBarBurst(isBoss);            // ★ヒヒイロカネの金の延べ棒が大量に噴き出す
    const count=isBoss?20:14;
    for(let i=0;i<count;i++){
      if(activeParts.length>=MAX_PARTICLES) break;
      const e=getPartEl();

// ----- 音(WebAudioビープのみ・外部音源なし) -----
function unlockAudio(){
  if(D.audioReady) return;
  try{
    const Ctx=window.AudioContext||window.webkitAudioContext;
    if(!Ctx) return;
    D.audioCtx=new Ctx();
    if(D.audioCtx.state==="suspended") D.audioCtx.resume();
    // 無音1サンプルを即再生して音声デバイスをスリープから起こす(初回再生のレイテンシ低減)
    try{ const wb=D.audioCtx.createBuffer(1,1,22050); const ws=D.audioCtx.createBufferSource(); ws.buffer=wb; ws.connect(D.audioCtx.destination); ws.start(0); }catch(e){}
    D.audioReady=true;
    if(state.settings.bgm) startBGM();   // 初回操作でBGM開始(自動再生ポリシー対応)
  }catch(e){}
}
function blip(freq,dur){
  if(!state.settings.sound||!D.audioReady||!D.audioCtx) return;
  try{
    const ctx=D.audioCtx, t=ctx.currentTime;
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type="triangle"; o.frequency.value=freq||600;
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(0.12,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,t+(dur||0.08));
    o.connect(g);g.connect(ctx.destination);
    o.start(t);o.stop(t+(dur||0.08)+0.02);
  }catch(e){}
}

// ----- BGM (WebAudioのみ・外部音源なし・軽量チップチューンのループ) -----
const BGM_STEP=0.30; // 1ステップ秒(=8分音符相当)
const BGM_MELODY=[523,0,659,784,659,0,587,659, 523,0,440,523,392,0,440,0, 587,0,659,784,880,784,659,587, 523,0,494,440,392,0,0,0];
const BGM_BASS  =[131,0,131,0,165,0,196,0, 131,0,131,0,147,0,165,0, 110,0,110,0,131,0,147,0, 98,0,98,0,131,0,196,0];
let _bgm={on:false,timer:null,idx:0,next:0,bus:null};
function bgmTone(freq,t,dur,type,vol){
  if(!freq||!_bgm.bus||!D.audioCtx) return;
  const ctx=D.audioCtx, o=ctx.createOscillator(), g=ctx.createGain();
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(vol,t+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur*0.85);
  o.connect(g); g.connect(_bgm.bus); o.start(t); o.stop(t+dur+0.02);
}
function bgmSchedule(){
  if(!_bgm.on||!D.audioCtx) return;
  const ctx=D.audioCtx;
  while(_bgm.next < ctx.currentTime+0.3){
    const i=_bgm.idx % BGM_MELODY.length;
    bgmTone(BGM_MELODY[i], _bgm.next, BGM_STEP, "triangle", 0.18);
    if(i%2===0) bgmTone(BGM_BASS[i], _bgm.next, BGM_STEP*1.9, "sine", 0.16);
    _bgm.next += BGM_STEP; _bgm.idx++;
  }
}
function startBGM(){
  if(_bgm.on) return;
  _bgm.on=true;                       // 先にフラグを立て、unlockAudio経由の再入を防ぐ
  unlockAudio();
  if(!D.audioCtx){ _bgm.on=false; return; }
  if(!_bgm.bus){ _bgm.bus=D.audioCtx.createGain(); _bgm.bus.gain.value=0.0001; _bgm.bus.connect(D.audioCtx.destination); }
  if(D.audioCtx.state!=="running"){ try{D.audioCtx.resume();}catch(e){} }
  _bgm.idx=0; _bgm.next=D.audioCtx.currentTime+0.05;
  const t=D.audioCtx.currentTime;
  _bgm.bus.gain.cancelScheduledValues(t);
  _bgm.bus.gain.setValueAtTime(0.08,t);                 // 可聴域から開始(無音→急上昇の指数フェードを避ける)
  _bgm.bus.gain.linearRampToValueAtTime(0.5,t+0.3);     // 短い線形フェードイン(素早く聞こえる)
  if(_bgm.timer) clearInterval(_bgm.timer);
  _bgm.timer=setInterval(bgmSchedule,70);
  bgmSchedule();
}
function stopBGM(){
  if(!_bgm.on) return;
  _bgm.on=false;
  if(_bgm.timer){ clearInterval(_bgm.timer); _bgm.timer=null; }
  if(_bgm.bus&&D.audioCtx){ const t=D.audioCtx.currentTime; _bgm.bus.gain.cancelScheduledValues(t); _bgm.bus.gain.setValueAtTime(Math.max(0.0001,_bgm.bus.gain.value),t); _bgm.bus.gain.exponentialRampToValueAtTime(0.0001,t+0.4); }
}

// 必殺技SE: 他のSE(三角/サイン波の柔らかいチップチューン)に寄せた爽快フルール。
// 駆け上がりアルペジオ → きらめく大和音(シャーン) → 丸い低音の重み。
function superSE(){
  if(!state.settings.sound||!D.audioReady||!D.audioCtx) return;
  try{
    const ctx=D.audioCtx, t0=ctx.currentTime;
    const tone=(freq,start,dur,vol,type)=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.type=type||"triangle"; o.frequency.value=freq;
      g.gain.setValueAtTime(0.0001,start);
      g.gain.exponentialRampToValueAtTime(vol,start+0.012);
      g.gain.exponentialRampToValueAtTime(0.0001,start+dur);
      o.connect(g); g.connect(ctx.destination); o.start(start); o.stop(start+dur+0.04);
    };
    // (1) 駆け上がる上昇アルペジオ(ズバッ)
    [523,659,784,1047,1319].forEach((f,i)=> tone(f, t0+i*0.042, 0.13, 0.14));
    // (2) きらめく大和音(シャーン)。重ねすぎて厚くならないよう本数・音量を少し控えめに
    const tc=t0+0.21;
    [1047,1319,1568,2093].forEach(f=> tone(f, tc, 0.5, 0.085));
    tone(2637, tc, 0.34, 0.035, "sine");   // 倍音きらめきは1本だけ
    // (3) 丸い低音の重み(柔らかいブン)
    tone(110, tc, 0.55, 0.12, "sine");
    tone(165, tc, 0.45, 0.07, "sine");
  }catch(e){}
}
function superSlash(){
  const fl=document.getElementById("flashLayer"); if(!fl) return;
  const s=document.createElement("div"); s.className="superslash"; fl.appendChild(s);
  setTimeout(()=>{ if(s.parentNode) s.parentNode.removeChild(s); },440);

function fireSuper(){
  if(!superReady()) return;
  state.super.charge=0;
  D.dirtyHUD=true; D.saveDirty=true;
  // 確定クリティカル級の大連撃: タップ威力 × クリ倍率 × SUPER_TAP_HITS + 現在DPSのN秒分
  const cr=getCrit();
  const dmg=Bg(D.tapDmg).mul(cr.mult*SUPER_TAP_HITS).add(Bg(D.dps).mul(SUPER_DPS_SECONDS));   // Big
  const ctr=rectCenter();
  // 余剰ダメージは gameTick 同様に繰り越して複数撃破
  let rem=dmg, kills=0; const MAX=400;
  while(!rem.isZero() && kills<MAX){
    const hp=state.bahamut.hp;
    if(rem.gte(hp)){ rem=rem.sub(hp); _burstKill=(kills+1<MAX)&&rem.gte(state.bahamut.maxHp); dealDamage(hp,{source:"super",silent:true}); _burstKill=false; kills++; }
    else { dealDamage(rem,{source:"super",silent:true}); rem=BIG0; }
  }
  // 演出: ズバシャーン
  if(state.settings.damageNumbers) spawnDamageNumber(dmg,ctr.x,ctr.y-10,true,false,true);
  if(state.settings.motion){

    screenShake(16); flashBoss();
    const fl=document.getElementById("flashLayer"); if(fl){ const f=document.createElement("div"); f.className="bigflash"; fl.appendChild(f); setTimeout(()=>f.remove(),300); }
  }

}

function gameTick(){
  const t=nowMs();
  let dt=(t-D.lastTickAt)/1000;
  D.lastTickAt=t;
  if(!Number.isFinite(dt)||dt<0) dt=TICK_MS/1000;
  if(dt>1.5) dt=1.5; // 大きなギャップは上限(バックグラウンド復帰など)
  state.stats.playTimeMs+=dt*1000;
  // DPS適用: 仲間の攻撃を「定周期の通常/会心ヒット」として実際にHPへ適用。
  // 表示=実際に減ったHP、会心は本物(HPが大きく減る)、平均は実DPS不変(owed/cf を base、平均 base*cf=owed)。
  const dps=Bg(D.dps);
  if(!dps.isZero()){
    D._autoAcc=Bg(D._autoAcc||0).add(dps.mul(dt));        // この周期で与える平均ダメージを蓄積(Big)
    if(t-(D._autoAt||0)>=AUTO_DMG_MS && !D._autoAcc.isZero()){
      const owed=D._autoAcc; D._autoAcc=BIG0; D._autoAt=t;
      const cr=getCrit(); const cf=1+cr.chance*(cr.mult-1); const isCrit=Math.random()<cr.chance;
      let dmg=isCrit ? owed.div(cf).mul(cr.mult) : owed.div(cf);    // 通常 or 会心の実ダメージ(Big)
      if(state.settings.damageNumbers) spawnDamageNumber(dmg,null,null,isCrit,true);     // auto=true: 非会心=小シアン / 会心=控えめゴールド「会心」
      if(state.settings.motion) spawnHitSpark(null,null,false);                          // 粒子は通常量(タップ会心より控えめ)
      let kills=0; const MAXK=400;
      while(!dmg.isZero() && kills<MAXK){
        const hp=state.bahamut.hp;
        if(dmg.gte(hp)){
          dmg=dmg.sub(hp);
          const willKillAgain=(kills+1<MAXK)&&dmg.gte(state.bahamut.maxHp);
          _burstKill=willKillAgain;
          dealDamage(hp,{source:"dps",silent:true});
          _burstKill=false; kills++;
        } else { dealDamage(dmg,{source:"dps",silent:true}); dmg=BIG0; }
      }
    }
    // たまに攻撃モーション
    if(state.settings.motion && Math.random()<0.25) partyAttackAnim();
  }
  // 自動セーブ
  if(D.saveDirty && t-D.lastSaveAt>AUTOSAVE_MS){ save("auto"); }
  D.dirtyHUD=true;
}

let _prevTs=0, _recAcc=0;
function renderLoop(ts){
  const dt=_prevTs?Math.min((ts-_prevTs)/1000,0.05):0.016;
  _prevTs=ts;
  // HUD
  if(D.dirtyHUD){ renderHUD(); renderSuper(); D.dirtyHUD=false; }
  // 記録タブは表示中、約4Hzでプレイ時間などを即時更新
  if(currentTab==="records"){ _recAcc+=dt; if(_recAcc>=0.25){ _recAcc=0; D.dirtyPanel=true; } }
  // パネル
  renderPanel(false);
  // FX進行
  updateFx(dt);
  // shake
  if(D.shake>0.1){
    D.shakeT+=dt;
    const decay=Math.exp(-D.shakeT*9);
    const mag=D.shake*decay;
    const ox=(Math.random()*2-1)*mag;
    const oy=(Math.random()*2-1)*mag;
    dom.battle.style.transform=`translate(${ox.toFixed(1)}px,${oy.toFixed(1)}px)`;
    D.shake*=Math.pow(0.001,dt); // 速い減衰
    if(D.shake<0.2){D.shake=0;dom.battle.style.transform="";}
  }
  requestAnimationFrame(renderLoop);
}
function updateFx(dt){
  // ダメージ数字
  for(let i=activeDmg.length-1;i>=0;i--){
    const o=activeDmg[i];
    o.t+=dt*1000;
    const k=o.t/o.life;
    if(k>=1){ retireDmg(o); activeDmg.splice(i,1); continue; }
    let scale,op,yoff;
    if(o.isCrit){
      scale=k<0.15?(0.3+k/0.15*1.1):(k<0.3?(1.4-(k-0.15)/0.15*0.45):1.0);
      op=k<0.2?k/0.2:(1-(k-0.2)/0.8);
      yoff=-50*k;
    } else {
      scale=k<0.2?(0.6+k/0.2*0.55):1.0;
      op=k<0.2?k/0.2:(1-(k-0.2)/0.8);
      yoff=-46*k;
    }
    o.el.style.opacity=op.toFixed(2);
    o.el.style.transform=`translate(calc(-50% + ${(o.dx*k).toFixed(1)}px),calc(-50% + ${yoff.toFixed(1)}px)) scale(${scale.toFixed(2)})`;
  }
  // 粒子
  for(let i=activeParts.length-1;i>=0;i--){
    const o=activeParts[i];
    o.t+=dt*1000;
    if(o.t>=o.life){ o.el.style.opacity="0"; partPool.push(o.el); activeParts.splice(i,1); continue; }
    o.vy+=o.g*dt;
    o.x+=o.vx*dt; o.y+=o.vy*dt; o.rot+=o.vr*dt;
    const k=o.t/o.life;
    o.el.style.left=o.x.toFixed(1)+"px";
    o.el.style.top=o.y.toFixed(1)+"px";
    o.el.style.opacity=(1-k).toFixed(2);
    o.el.style.transform=`translate(-50%,-50%) rotate(${o.rot.toFixed(0)}deg)`;
  }
}

/* ---- 連打(オートクリッカー)検知: 直近60秒のタップ数を秒バケットで集計(配列は最大61要素)。
   1000回「超」で全没収。警告→継続で発動。1分1000回=毎秒約16.7で人間にはほぼ不可能。
   ※ローカル単体プレイなのでセーブ直編集での回避は可能。あくまで連打ツール対策のギミック。 ---- */
const ANTISPAM_LIMIT=1000, ANTISPAM_WARN=500, ANTISPAM_TOOL_RATE=14, ANTISPAM_RESET_MS=10000;
// ツール相当=直近1秒で14回以上の連打。そのときだけ累積し、10秒ツール相当が無ければ累積リセット。警告は50%(=500)で。
let _spamCount=0, _spamRecent=[], _lastFastAt=0, _antiWarnAt=0, _antiCooldownUntil=0;
// (旧 antiSpamCount[60秒ローリング窓]は廃止 → レート方式に変更。判定は antiSpamCheck 内)
function antiSpamBubble(girlId,text){
  const g=GIRL_BY_ID[girlId]; if(!g) return;
  const layer=document.getElementById("bubbleLayer"); if(!layer) return;
  while(layer.children.length>=2) layer.removeChild(layer.firstChild);

  b.innerHTML=`<span class="bmini">${girlSvg(g)}</span><span><span class="bname">${g.name}</span> ${text}</span>`;
  layer.appendChild(b);
  setTimeout(()=>{ if(b.parentNode) b.parentNode.removeChild(b); },3100);
}
function antiSpamPenalty(total){
  const lost=state.hihiirokane;
  state.hihiirokane=BIG0;
  _spamCount=0; _spamRecent=[]; _lastFastAt=0; _antiCooldownUntil=nowMs()+2000;   // 判定リセット&短いクールダウン
  D.dirtyHUD=true; D.dirtyPanel=true; D.saveDirty=true;
  if(state.settings.motion) screenShake(11);
  if(state.settings.sound) blip(140,0.4);
  const sp=pickSpeaker(); const who=sp?GIRL_BY_ID[sp].name:"バハムート";
  showModal(`<h2 id="modalTitle">⚠️ 連打ツールを検知！</h2>
    <p>ツールのような超高速連打 <span class="big">${formatNumber(total)}</span> 回…<br>それは人間には無理だよね？</p>
    <p>ペナルティとして<br>ヒヒイロカネ <span class="big">${formatNumber(lost)}</span> を<br><b>ぜんぶ没収</b>しました。</p>
    <p style="opacity:.8">${who}「正々堂々と遊んでね！」</p>
    <div class="modalBtns"><button class="mbtn-primary" id="mOk">ごめんなさい…</button></div>`);
  const ok=document.getElementById("mOk"); if(ok) ok.onclick=hideModal;
}
// 戻り値 true で没収発動(このタップのダメージはスキップ)
function antiSpamCheck(now){
  if(now<_antiCooldownUntil) return false;
  // 直近1秒の瞬間レートを測り、ツール相当(14回/秒以上)のときだけ累積。手動は加算されない。
  _spamRecent.push(now);
  while(_spamRecent.length && _spamRecent[0] < now-1000) _spamRecent.shift();
  if(_spamRecent.length>=ANTISPAM_TOOL_RATE){ _lastFastAt=now; _spamCount++; }
  if(now-_lastFastAt>=ANTISPAM_RESET_MS) _spamCount=0;   // 10秒間ツール相当の連打が無ければ判定リセット
  if(_spamCount>ANTISPAM_LIMIT){ antiSpamPenalty(_spamCount); return true; }
  if(_spamCount>=ANTISPAM_WARN && now-_antiWarnAt>4000){   // 閾値の50%(=500)で警告
    _antiWarnAt=now;
    toast("⚠️ 連打ツールはダメ！このまま続けるとヒヒイロカネ没収だよ…",{type:"warn",ms:3200});
    const sp=pickSpeaker(); if(sp) antiSpamBubble(sp,"こらっ、連打ツールは禁止だよ！");
    blip(240,0.18);
  }
  return false;
}
